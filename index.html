<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE = 'https://memorial-watch-backend-2.onrender.com';
const WANTED_BG = 'https://raw.githubusercontent.com/bspencer413/DORA/main/wanted.png';
const BILL_PHOTO = 'https://raw.githubusercontent.com/Bspencer413/Memorial-watch/main/Bill.jpeg';
const DORA_VERSION = '1.2.0';
const BACKEND_VERSION = '1.4.1';

const isPhone = window.innerWidth < 500;
const isTablet = window.innerWidth >= 500 && window.innerWidth < 1024;
const PT = isPhone ? '38vh' : isTablet ? '48vh' : '44vh';
const TAP_TOP = isPhone ? '82%' : '84%';

const toTitleCase = (str) => {
  if (!str) return str;
  return str.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase())
            .replace(/'\w/g, txt => txt.toUpperCase());
};

// Icons

  </svg>

  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
  </svg>
);
const TrashIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

  </svg>
);
const EditIcon = () => (

    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />

);
const EyeOffIcon = () => (

    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
  </svg>

const ClearableInput = ({ value, onChange, onBlur, onKeyPress, placeholder, type='text', maxLength, inputClass }) => (
  <div className="relative">
    <input type={type} placeholder={placeholder} value={value} onChange={onChange} onBlur={onBlur} onKeyPress={onKeyPress} maxLength={maxLength} className={inputClass + ' pr-10'} />
    {value && value.length > 0 && (
      <button onClick={() => onChange({ target: { value: '' } })} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white text-lg font-bold leading-none" type="button">✕</button>
    )}
  </div>
);

const POSTER_STYLE = {
  backgroundColor: '#2c1a0e',
  backgroundImage: `url(${WANTED_BG})`,
  backgroundSize: 'contain',
  backgroundPosition: 'center top',
  backgroundRepeat: 'no-repeat',
  backgroundAttachment: 'fixed',
};

const PageWrapper = ({ children }) => (
  <div style={{ minHeight: '100dvh', width: '100%', position: 'relative', paddingBottom: '5.5rem', ...POSTER_STYLE }}>
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.22)' }} />
    <div style={{ position: 'relative', zIndex: 10 }}>{children}</div>
  </div>
);

function isDeceasedCheck(extract, description, deathDate, type) {
  if (type === 'disambiguation') return false;
  if (deathDate) return true;
  const firstSentence = extract.split('.')[0];
  const hasDeathInBrackets = /\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(firstSentence);
  const hasYearsInDescription = /\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(description);
  const hasBornOnly = /\([^)]*born\s+\w+\s+\d+,\s+\d{4}\)/.test(firstSentence);
  if (hasBornOnly && !hasDeathInBrackets && !hasYearsInDescription) return false;
  const isPastTense = /^[^.]*\bwas (an?|the)\b[^.]*\./.test(extract) && !/\([^)]*born/.test(firstSentence) && !/born\s+\d{4}/.test(description);
  const diedInExtract = /\b(died|death|passed away|deceased)\b/i.test(extract);
  const diedInDescription = /\b(died|death|deceased)\b/i.test(description);
  return hasDeathInBrackets || hasYearsInDescription || isPastTense || diedInExtract || diedInDescription;
}

function App() {
  const [page, setPage] = useState('landing');
  const [auth, setAuth] = useState(false);
  const [user, setUser] = useState(null);
  const [watchlist, setWatchlist] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [loading, setLoading] = useState(false);
  const [backendWaking, setBackendWaking] = useState(false);
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [nw, setNw] = useState({ name: '', location: '', birthYear: '' });
  const [watchlistCheck, setWatchlistCheck] = useState(null);
  const [watchlistChecking, setWatchlistChecking] = useState(false);
  const [watchlistChecked, setWatchlistChecked] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editingName, setEditingName] = useState('');
  const [drawerItem, setDrawerItem] = useState(null); // { name, profile, loading }
  const [showDangerZone, setShowDangerZone] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  // Notification statuses cached from last poll
  // notifMap: { watchlist_id -> notification object } for quick lookup
  const [notifMap, setNotifMap] = useState({});

  useEffect(() => {
    const t = localStorage.getItem('doa_token');
    const u = localStorage.getItem('doa_user');
    if (t && u) { setUser(JSON.parse(u)); setAuth(true); setPage('watchlist'); loadWatchlist(); loadNotifications(); }
    const vis = () => { if (document.visibilityState === 'visible') setTimeout(() => document.querySelectorAll('input').forEach(i => i.blur()), 100); };
    document.addEventListener('visibilitychange', vis);
    return () => document.removeEventListener('visibilitychange', vis);
  }, []);

  // Poll notifications every 60s when logged in
  useEffect(() => {
    if (!auth) return;
    const interval = setInterval(loadNotifications, 60000);
    return () => clearInterval(interval);
  }, [auth]);

  const loadWatchlist = async () => {
    try {
      const token = localStorage.getItem('doa_token');
      const r = await fetch(`${API_BASE}/watchlist`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      setWatchlist(await r.json());
    } catch (e) { console.error(e); }
  };

  const loadNotifications = async () => {
    try {
      const token = localStorage.getItem('doa_token');
      const r = await fetch(`${API_BASE}/notifications`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      const notifs = await r.json();
      setNotifications(notifs);
      // Build a map: watchlist_id -> notification
      const map = {};
      notifs.forEach(n => { map[n.watchlist_id] = n; });
      setNotifMap(map);
    } catch (e) { console.error(e); }
  };

  const doAuth = async () => {
    if (!email || !password) return;
    setLoading(true); setBackendWaking(false);
    const wt = setTimeout(() => setBackendWaking(true), 3000);
    try {
      const r = await fetch(`${API_BASE}/auth/${mode === 'login' ? 'login' : 'register'}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      clearTimeout(wt); setBackendWaking(false);
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Auth failed'); }
      const data = await r.json();
      localStorage.setItem('doa_token', data.access_token);
      const u = { email, name: email.split('@')[0] };
      localStorage.setItem('doa_user', JSON.stringify(u));
      setUser(u); setAuth(true); setPage('watchlist');
      loadWatchlist(); loadNotifications();
    } catch (err) { clearTimeout(wt); setBackendWaking(false); alert('Error: ' + err.message); }
    finally { setLoading(false); }
  };

  const doLogout = () => {
    localStorage.removeItem('doa_token'); localStorage.removeItem('doa_user');
    setAuth(false); setUser(null); setWatchlist([]); setNotifications([]); setNotifMap({});
    setWatchlistCheck(null); setWatchlistChecked(false); setPage('landing');
  };

  const doDeleteAccount = async () => {
    try {
      const token = localStorage.getItem('doa_token');
      const r = await fetch(`${API_BASE}/account`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      doLogout(); alert('Account permanently deleted.');
    } catch (err) { alert('Error: ' + err.message); }
  };

  const fetchWikiProfile = async (name) => {
    try {
      const w = await (await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(toTitleCase(name))}`)).json();
      if (!w.extract) return null;
      const extract = w.extract || '', description = w.description || '', type = w.type || '';
      if (type === 'disambiguation') return { title: w.title.replace(' (disambiguation)', ''), extract, thumbnail: w.thumbnail?.source, birthDate: null, deathDate: null, description, isDisambiguation: true };
      const deceased = isDeceasedCheck(extract, description, w.death_date, type);
      return { title: w.title, extract, thumbnail: w.thumbnail?.source, birthDate: w.birth_date || null, deathDate: deceased ? (w.death_date || 'deceased') : null, description, isDisambiguation: false };
    } catch (e) { return null; }
  };

  const openDrawer = async (name) => {
    setDrawerItem({ name, profile: null, loading: true });
    const profile = await fetchWikiProfile(name);
    setDrawerItem({ name, profile, loading: false });
  };

  const isOnWatchlist = (name) => watchlist.some(w => w.name.toLowerCase() === name.toLowerCase());

  const checkWatch = async () => {
    const name = toTitleCase(nw.name);
    if (!name.trim() || name.trim().length < 2) { alert('Please enter a name.'); return; }
    if (isOnWatchlist(name)) { alert(`${name} is already on your watchlist!`); return; }
    setWatchlistChecking(true); setWatchlistCheck(null); setWatchlistChecked(false);
    try { const profile = await fetchWikiProfile(name); setWatchlistCheck({ profile, name }); setWatchlistChecked(true); }
    catch (e) { setWatchlistCheck({ profile: null, name }); setWatchlistChecked(true); }
    finally { setWatchlistChecking(false); }
  };

  const confirmAdd = async () => {
    if (!watchlistCheck) return;
    setLoading(true);
    try {
      const token = localStorage.getItem('doa_token');
      const r = await fetch(`${API_BASE}/watchlist`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name: watchlistCheck.name, location: nw.location, dob: nw.birthYear })
      });
      if (!r.ok) throw new Error('Failed');
      await loadWatchlist();
      setWatchlistCheck(null); setWatchlistChecked(false); setNw({ name: '', location: '', birthYear: '' });
    } catch (err) { alert('Error: ' + err.message); }
    finally { setLoading(false); }
  };

  const delWatch = async (id) => {
    try {
      const token = localStorage.getItem('doa_token');
      await fetch(`${API_BASE}/watchlist/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      await loadWatchlist();
    } catch (err) { alert('Error: ' + err.message); }
  };

  // ---- DERIVED STATE ----
  const unreadCount = notifications.length;
  const hasAlerts = unreadCount > 0;

  // Status for a watchlist item: check if it has a notification
  const itemStatus = (w) => {
    // Check by watchlist id
    if (notifMap[w.id]) return 'deceased';
    return 'active';
  };

  const iClass = "w-full px-4 py-3 border border-red-900/50 rounded-xl focus:ring-2 focus:ring-red-500 text-lg bg-gray-900/60 text-white placeholder-gray-400";
  const cardClass = "bg-black/40 rounded-2xl p-4 shadow-lg border border-red-900/30 backdrop-blur-sm";

  // ---- COMPONENTS ----

  const WikiDrawer = () => {
    if (!drawerItem) return null;
    const { name, profile, loading: dLoading } = drawerItem;
    return (
      <>
        <div className="modal-overlay" onClick={() => setDrawerItem(null)} />
        <div className="modal-drawer">
          <div className="flex justify-between items-center px-5 pt-5 pb-3 border-b border-red-900/40">
            <h3 className="text-white font-bold text-xl">{name}</h3>
            <button onClick={() => setDrawerItem(null)} className="text-gray-400 hover:text-white text-2xl font-bold leading-none">✕</button>
          </div>
          <div className="p-5">
            {dLoading && <div className="text-center py-10"><p className="text-white/60 text-lg animate-pulse">Looking up {name}...</p></div>}
            {!dLoading && !profile && (
              <div className="text-center py-8">
                <p className="text-4xl mb-3">?</p>
                <p className="text-white font-bold text-xl">Not in Wikipedia</p>
                <p className="text-gray-300 text-base mt-2">No Wikipedia entry for "{name}"</p>
                <p className="text-gray-400 text-sm mt-1">This is likely a private individual — we monitor Legacy obituaries for them.</p>
              </div>
            )}
            {!dLoading && profile && (
              <>
                <div className={`px-4 py-2 rounded-xl mb-4 flex items-center gap-3 ${profile.deathDate ? 'bg-gray-700' : profile.isDisambiguation ? 'bg-yellow-600' : 'bg-green-700'}`}>
                  <span className="text-white font-black text-lg">{profile.deathDate ? '⚫ DEAD' : profile.isDisambiguation ? '🟡 UNSURE' : '🟢 ALIVE'}</span>
                  {profile.deathDate && profile.deathDate !== 'deceased' && <span className="text-white/80 text-sm ml-auto">Died: {profile.deathDate}</span>}
                </div>
                <div className="flex gap-4 items-start mb-4">
                  {profile.thumbnail
                    ? <img src={profile.thumbnail} alt={profile.title} className="w-20 h-20 rounded-full object-cover border-2 border-red-600/50 shrink-0" />
                    : <div className="w-20 h-20 rounded-full bg-red-900/40 flex items-center justify-center shrink-0 text-3xl">?</div>}
                  <div className="flex-1">
                    <h2 className="text-white text-xl font-bold mb-1">{profile.title}</h2>
                    {profile.birthDate && <p className="text-red-300 text-sm font-bold">Born: {profile.birthDate}</p>}
                    {!profile.isDisambiguation && <p className="text-red-400 text-sm italic mt-1">{profile.description}</p>}
                  </div>
                </div>
                {!profile.isDisambiguation && profile.extract && <p className="text-gray-100 text-base leading-relaxed mb-4">{profile.extract}</p>}
                {profile.isDisambiguation && <div className="p-3 bg-yellow-500/20 border border-yellow-400/30 rounded-xl mb-4"><p className="text-yellow-200 text-sm text-center">Multiple people share this name</p></div>}
                {profile.deathDate && <div className="p-3 bg-gray-700/50 border border-gray-600/30 rounded-xl mb-4"><p className="text-gray-200 text-sm text-center">This person has passed away</p></div>}
              </>
            )}
            <button onClick={() => setDrawerItem(null)} className="w-full py-3 bg-red-900/40 border border-red-800/50 text-white rounded-xl text-base font-medium mt-2">Close</button>
          </div>
        </div>
      </>
    );
  };

  const WatchlistCheckCard = () => {
    if (!watchlistCheck) return null;
    const { profile, name } = watchlistCheck;
    const isDeceased = profile && profile.deathDate;
    const isDisambig = profile && profile.isDisambiguation;
    const notFound = !profile;
    return (
      <div className="rounded-2xl overflow-hidden border border-red-800 shadow-lg mt-4">
        <div className={`px-5 py-2 ${isDeceased ? 'bg-gray-700' : isDisambig ? 'bg-yellow-600' : notFound ? 'bg-blue-700' : 'bg-green-700'}`}>
          <span className="text-white font-black tracking-widest text-base">{isDeceased ? '⚫ DEAD' : isDisambig ? '🟡 UNSURE' : notFound ? 'NOT IN WIKIPEDIA' : '🟢 ALIVE'}</span>
        </div>
        <div className="bg-gray-900/80 p-4">
          {profile && !notFound && (
            <>
              <div className="flex gap-3 items-start mb-3">
                {profile.thumbnail ? <img src={profile.thumbnail} alt={profile.title} className="w-16 h-16 rounded-full object-cover border-2 border-red-600/50 shrink-0" /> : <div className="w-16 h-16 rounded-full bg-red-900/40 flex items-center justify-center shrink-0 text-2xl">?</div>}
                <div className="flex-1">
                  <h2 className="text-white text-lg font-bold mb-1">{profile.title}</h2>
                  {profile.birthDate && <p className="text-red-300 text-sm font-bold">Born: {profile.birthDate}</p>}
                  {!isDisambig && <p className="text-red-400 text-xs italic mt-1">{profile.description}</p>}
                </div>
              </div>
              {!isDisambig && profile.extract && <p className="text-gray-100 text-sm leading-relaxed mb-3">{profile.extract.split('.').slice(0, 2).join('.') + '.'}</p>}
            </>
          )}
          {notFound && <div className="mb-3"><p className="text-white text-base font-bold">"{name}"</p><p className="text-gray-300 text-sm mt-1">Not in Wikipedia — may be a private individual.</p></div>}
          {isDisambig && <p className="text-yellow-200 text-sm mb-3">Multiple people share this name</p>}
          {isDeceased && <p className="text-gray-200 text-sm mb-3">This person has already passed away.{profile.deathDate !== 'deceased' ? ` Died: ${profile.deathDate}` : ''}</p>}
          {!isDeceased && (
            <div className="space-y-2 mt-2">
              <p className="text-white/80 text-sm text-center font-medium border-t border-white/10 pt-2">
                {notFound ? `Add "${name}" to your watchlist?` : `Add ${profile.title || name} to your watchlist?`}
              </p>
              <button onClick={confirmAdd} disabled={loading} className="w-full py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-base flex items-center justify-center gap-2 disabled:opacity-50">
                <PlusIcon /> {loading ? 'Adding...' : 'Yes, Add to Watchlist'}
              </button>
              <button onClick={() => { setWatchlistChecked(false); setWatchlistCheck(null); }} className="w-full py-2.5 bg-white/10 border border-white/20 text-white/80 rounded-xl text-sm text-center flex items-center justify-center gap-2">
                <EditIcon /> Edit Name
              </button>
              <button onClick={() => { setWatchlistCheck(null); setWatchlistChecked(false); setNw({ name: '', location: '', birthYear: '' }); }} className="w-full py-1.5 text-white/40 text-xs text-center">Cancel</button>
            </div>
          )}
          {isDeceased && <button onClick={() => { setWatchlistCheck(null); setWatchlistChecked(false); setNw({ name: '', location: '', birthYear: '' }); }} className="w-full py-2.5 bg-white/10 border border-white/20 text-white/80 rounded-xl text-sm text-center mt-2">Try Another Name</button>}
        </div>
      </div>
    );
  };

  // ---- PAGES ----

  if (page === 'landing') {
    return (
      <div onClick={() => setPage('login')} style={{ minHeight: '100dvh', width: '100%', cursor: 'pointer', position: 'relative', ...POSTER_STYLE }}>
        <div style={{ position: 'absolute', top: TAP_TOP, left: 0, right: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '0.4rem' }}>
          <div className="tap-pulse" style={{ color: 'white', fontSize: isPhone ? '1.2rem' : '1.1rem', fontWeight: '900', letterSpacing: '0.12em', textShadow: '0 2px 8px rgba(0,0,0,0.9)', textAlign: 'center' }}>TAP TO ENTER</div>
          <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem' }}>Free during beta</div>
        </div>
      </div>
    );
  }

  if (page === 'login') {
    return (
      <div style={{ minHeight: '100dvh', width: '100%', ...POSTER_STYLE, display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: PT, paddingLeft: '1.5rem', paddingRight: '1.5rem', paddingBottom: '2rem' }}>
        <div style={{ width: '100%', maxWidth: '22rem' }}>
          <div className="bg-black/55 backdrop-blur-sm rounded-2xl p-5 shadow-2xl border border-red-900/40 space-y-4">
            <div className="text-center">
              <h1 className="text-white text-2xl font-black tracking-widest">DEAD OR ALIVE</h1>
              <p className="text-red-300 text-base mt-1 font-bold">Find out if the people you remember are dead or alive</p>
              <p className="text-white/50 text-xs mt-1">Free during beta</p>
            </div>
            <input type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} onKeyPress={e => e.key === 'Enter' && doAuth()} className="w-full px-4 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-red-500 text-base" />
            <div className="relative">
              <input type={showPassword ? 'text' : 'password'} placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyPress={e => e.key === 'Enter' && doAuth()} className="w-full px-4 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-red-500 text-base" />
              <button onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-white/60">{showPassword ? <EyeOffIcon /> : <EyeIcon />}</button>
            </div>
            {backendWaking && <p className="text-white/60 text-sm text-center animate-pulse">Waking up the server...</p>}
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => { setMode('login'); doAuth(); }} disabled={loading} className="py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl disabled:opacity-50 text-base">{loading && mode === 'login' ? '...' : 'Sign In'}</button>
              <button onClick={() => { setMode('register'); doAuth(); }} disabled={loading} className="py-3 bg-white/20 hover:bg-white/30 text-white font-bold rounded-xl disabled:opacity-50 text-base border border-white/30">{loading && mode === 'register' ? '...' : 'Register'}</button>
            </div>
            <p className="text-white/40 text-xs text-center">You'll stay signed in automatically</p>
          </div>
        </div>
      </div>
    );
  }

  // Main app
  return (
    <PageWrapper>
      <WikiDrawer />
      <div className="w-full max-w-sm mx-auto px-3">

        {/* ===== WATCHLIST PAGE (Home) ===== */}
        {page === 'watchlist' && (
          <div className="space-y-3" style={{ paddingTop: PT }}>
            {/* Add new person */}
            <div className={cardClass}>
              <h2 className="text-xl font-black text-white text-center tracking-wide mb-1">DEAD OR ALIVE</h2>
              <p className="text-red-300 text-sm text-center mb-3">Add a name — we'll watch for news of their passing</p>
              {!watchlistChecked ? (
                <div className="space-y-3">
                  <ClearableInput value={nw.name} onChange={e => setNw({...nw, name: e.target.value})} onBlur={e => setNw({...nw, name: toTitleCase(e.target.value)})} onKeyPress={e => e.key === 'Enter' && checkWatch()} placeholder="Full Name" inputClass={iClass} />
                  <ClearableInput value={nw.location} onChange={e => setNw({...nw, location: e.target.value})} onKeyPress={e => e.key === 'Enter' && checkWatch()} placeholder="City / State (optional)" inputClass={iClass} />
                  <ClearableInput value={nw.birthYear} onChange={e => setNw({...nw, birthYear: e.target.value.replace(/\D/g, '').slice(0, 4)})} onKeyPress={e => e.key === 'Enter' && checkWatch()} placeholder="Birth Year (optional)" maxLength={4} inputClass={iClass} />
                  <button onClick={checkWatch} disabled={watchlistChecking} className="w-full py-3 bg-red-600 text-white rounded-xl flex items-center justify-center gap-2 disabled:opacity-50 text-lg font-bold">
                    <SearchIcon /> {watchlistChecking ? 'Checking...' : 'Check & Add'}
                  </button>
                </div>
              ) : <WatchlistCheckCard />}
            </div>

            {/* Watchlist */}
            <div className={cardClass}>
              <h3 className="text-lg font-bold text-white text-center mb-1">Your Watchlist ({watchlist.length})</h3>
              <p className="text-xs text-gray-300 text-center mb-3">Tap a name to see their bio</p>
              {watchlist.length === 0
                ? <p className="text-gray-400 text-center py-6 text-base">No one on your watchlist yet</p>
                : (
                  <div className="space-y-3">
                    {watchlist.map(w => {
                      const status = itemStatus(w);
                      const isDeceased = status === 'deceased';
                      return (
                        <div key={w.id} className={`p-3 rounded-xl border ${isDeceased ? 'bg-gray-800/70 border-gray-600' : 'bg-gray-900/50 border-red-900/20'}`}>
                          {editingId === w.id ? (
                            <div className="space-y-2">
                              <ClearableInput value={editingName} onChange={e => setEditingName(e.target.value)} placeholder="Enter name" inputClass="w-full px-3 py-2 border border-red-700 rounded-lg text-base bg-gray-700 text-white placeholder-gray-400" />
                              <div className="flex gap-2">
                                <button onClick={async () => { await delWatch(w.id); const t = localStorage.getItem('doa_token'); await fetch(`${API_BASE}/watchlist`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${t}` }, body: JSON.stringify({ name: toTitleCase(editingName), location: w.location, dob: w.dob }) }); await loadWatchlist(); setEditingId(null); setEditingName(''); }} className="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm font-bold">Save</button>
                                <button onClick={() => { setEditingId(null); setEditingName(''); }} className="flex-1 py-2 bg-gray-600 text-gray-200 rounded-lg text-sm">Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div className="flex items-center justify-between">
                              <div className="flex-1">
                                <button onClick={() => openDrawer(w.name)} className="text-left w-full">
                                  <h4 className="font-semibold text-lg text-white hover:text-red-300 underline decoration-dotted">{w.name}</h4>
                                </button>
                                {(w.location || w.dob) && <p className="text-sm text-gray-300">{w.location}{w.dob ? ` · Born: ${w.dob}` : ''}</p>}
                                <p className={`text-sm font-bold mt-0.5 ${isDeceased ? 'text-gray-400' : 'text-green-400'}`}>
                                  {isDeceased ? '⚫ Deceased' : '🟢 Active'}
                                </p>
                              </div>
                              <div className="flex gap-1 ml-2">
                                <button onClick={() => { setEditingId(w.id); setEditingName(w.name); }} className="p-2 text-red-400 hover:bg-red-900/30 rounded-lg"><EditIcon /></button>
                                <button onClick={() => delWatch(w.id)} className="p-2 text-red-500 hover:bg-red-900/30 rounded-lg"><TrashIcon /></button>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
            </div>
          </div>
        )}

        {/* ===== ALERTS PAGE ===== */}
        {page === 'alerts' && (
          <div className="space-y-3" style={{ paddingTop: PT }}>
            <div className={cardClass}>
              <h2 className="text-xl font-black text-white text-center tracking-wide mb-1">ALERTS</h2>
              <p className="text-gray-300 text-xs text-center mb-4">Status changes for people on your watchlist</p>
              {notifications.length === 0 ? (
                <div className="text-center py-8">
                  <p className="text-5xl mb-3">🔔</p>
                  <p className="text-white font-bold text-xl">No alerts yet</p>
                  <p className="text-gray-300 text-base mt-2">We'll notify you when someone on your watchlist passes away</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {notifications.map(n => (
                    <div key={n.id} className="p-4 bg-red-950/60 border border-red-700 rounded-xl">
                      <div className="flex items-start gap-3">
                        <span className="text-2xl mt-0.5">⚫</span>
                        <div className="flex-1">
                          <button onClick={() => openDrawer(n.name)} className="text-left w-full">
                            <h3 className="font-bold text-white text-lg hover:text-red-300 underline decoration-dotted">{n.name}</h3>
                          </button>
                          <p className="text-gray-300 text-sm mt-1">{n.message}</p>
                          <p className="text-gray-500 text-xs mt-1">{new Date(n.created_at).toLocaleDateString()}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ===== ABOUT PAGE ===== */}
        {page === 'about' && (
          <div className="space-y-3" style={{ paddingTop: '1.5rem' }}>
            <div className={cardClass}>
              <h2 className="text-2xl font-black text-white tracking-wide mb-1">About Dead or Alive</h2>
              <p className="text-red-300 italic text-base leading-relaxed mb-4">Find out if someone you miss is dead or alive.</p>
              <div className="space-y-3 text-gray-100 text-base leading-relaxed">
                <p>Dead or Alive was built by three brains — mine, ChatGPT, and Claude (Anthropic). I'm a retired 74 year old former high-tech entrepreneur. As I get older, I look at the obituaries and wonder about old friends. Did they make it? Are they still out there?</p>
                <p>Traditional search engines are frustrating for this. So I built Dead or Alive — a straight answer to a simple question, with a watchlist that alerts you the moment someone passes away.</p>
                <p>We partner with Legacy, the largest obituary platform in the US, covering more than 70% of all U.S. deaths. We also partner with Wikipedia for biographical information on notable people.</p>
              </div>
              <div className="mt-4 pt-4 border-t border-red-900/30">
                <div className="flex items-center gap-4">
                  <img src={BILL_PHOTO} alt="Bill Spencer" className="w-14 h-14 rounded-full object-cover border-2 border-red-600 shadow-lg" />
                  <div>
                    <p className="font-bold text-white text-base">Bill Spencer</p>
                    <p className="text-red-400 italic text-sm">Idea Hamster 🐹</p>
                    <a href="mailto:bspencer413@me.com" className="text-red-400 text-xs mt-1 block">bspencer413@me.com</a>
                  </div>
                </div>
              </div>
              {/* Account / Sign out */}
              <div className="mt-4 pt-4 border-t border-red-900/30 space-y-3">
                <p className="text-gray-300 text-sm text-center">{user?.email}</p>
                <button onClick={doLogout} className="w-full py-3 bg-red-700 text-white rounded-xl text-base font-bold">Sign Out</button>
                <div>
                  <button onClick={() => setShowDangerZone(!showDangerZone)} className="w-full py-2 text-gray-500 text-xs text-center">{showDangerZone ? 'Hide' : 'Account Removal'}</button>
                  {showDangerZone && (
                    !showDeleteConfirm
                      ? <button onClick={() => setShowDeleteConfirm(true)} className="w-full py-2.5 bg-gray-900/70 border border-red-800 text-red-500 rounded-lg text-sm mt-2">Delete Account</button>
                      : <div className="bg-red-950/90 border border-red-800 rounded-xl p-4 space-y-3 mt-2">
                          <p className="text-red-300 text-sm">This will permanently delete your account and all data.</p>
                          <button onClick={doDeleteAccount} className="w-full py-2.5 bg-red-700 text-white rounded-lg font-bold text-sm">Yes, Delete Permanently</button>
                          <button onClick={() => { setShowDeleteConfirm(false); setShowDangerZone(false); }} className="w-full py-2.5 bg-gray-800 border border-gray-600 text-gray-300 rounded-lg text-sm">Cancel</button>
                        </div>
                  )}
                </div>
              </div>
              {/* Version info */}
              <div className="mt-4 pt-3 border-t border-red-900/20">
                <p className="text-gray-600 text-xs text-center">DORA v{DORA_VERSION} · Backend v{BACKEND_VERSION}</p>
              </div>
            </div>
          </div>
        )}

        {/* ===== SEARCH PAGE (commented out from nav, code preserved) ===== */}
        {/* page === 'search' && (
          <div className="space-y-3" style={{ paddingTop: PT }}>
            SEARCH CODE PRESERVED HERE FOR FUTURE USE
          </div>
        ) */}

      </div>

      {/* ===== BOTTOM NAV — 3 items, big, 50+ friendly ===== */}
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(10,0,0,0.95)', backdropFilter: 'blur(8px)', borderTop: '1px solid #7f1d1d', padding: '0.5rem 1rem', paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-around max-w-sm mx-auto">
          {/* WATCHLIST */}
          <button onClick={() => setPage('watchlist')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'watchlist' ? 'text-red-500' : 'text-gray-500'}`}>
            <HeartIcon />
            <span className="text-sm font-bold">WATCHLIST</span>
          </button>
          {/* ABOUT */}
          <button onClick={() => setPage('about')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'about' ? 'text-red-500' : 'text-gray-500'}`}>
            <InfoIcon />
            <span className="text-sm font-bold">ABOUT</span>
          </button>
          {/* BELL */}
          <button onClick={() => setPage('alerts')} className={`flex flex-col items-center gap-1 px-4 py-2 relative ${page === 'alerts' ? 'text-red-500' : hasAlerts ? 'text-yellow-400' : 'text-gray-500'}`}>
            <BellIcon color={hasAlerts ? '#facc15' : (page === 'alerts' ? '#ef4444' : '#6b7280')} filled={hasAlerts} />
            {hasAlerts && <span className="absolute top-1 right-2 bg-red-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-sm font-bold" style={{ color: hasAlerts ? '#facc15' : undefined }}>
              {hasAlerts ? `${unreadCount} ALERT${unreadCount > 1 ? 'S' : ''}` : '🔔'}
            </span>
          </button>
        </div>
        <p className="text-center text-gray-700 text-xs mt-0.5">v{DORA_VERSION}</p>
      </div>
    </PageWrapper>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
