const toTitleCase = (str) => {
  if (!str) return str;
  return str
    .replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase())
    .replace(/'\w/g, (txt) => txt.toUpperCase());
};

    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />

const ClearableInput = ({ value, onChange, onBlur, onKeyPress, placeholder, type='text', maxLength, inputClass }) => (
  <div className="relative">
    <input type={type} placeholder={placeholder} value={value} onChange={onChange} onBlur={onBlur} onKeyPress={onKeyPress} maxLength={maxLength} className={inputClass + ' pr-10'} />
    {value && value.length > 0 && (
      <button onClick={() => onChange({ target: { value: '' } })} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 text-lg font-bold leading-none" type="button">✕</button>
    )}

      <span className="text-white text-xs font-black">MW</span>

);

const PageWrapper = ({ children }) => (
  <div style={{
    minHeight: '100dvh', width: '100%', position: 'relative',
    paddingTop: '1rem', paddingBottom: '5rem',
    backgroundImage: `url(${SUNSET_BG})`,
    backgroundSize: 'cover',
    backgroundPosition: 'center top',
    backgroundRepeat: 'no-repeat',
    backgroundAttachment: 'fixed',
  }}>
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.10)' }} />
    <div style={{ position: 'relative', zIndex: 10 }}>{children}</div>
  </div>
);

function isDeceasedCheck(extract, description, deathDate, type) {
  if (type === 'disambiguation') return false;
  if (deathDate) return true;
  const firstSentence = extract.split('.')[0];
  const hasDeathInBrackets = /\(\d{4}\s*[-–—]\s*\d{4}\)/.test(firstSentence);
  const hasYearsInDescription = /\(\d{4}\s*[-–—]\s*\d{4}\)/.test(description);
  const hasBornOnly = /\(born\s+\w+\s+\d+,\s+\d{4}\)/.test(firstSentence);
  if (hasBornOnly && !hasDeathInBrackets && !hasYearsInDescription) return false;
  const isPastTense = /^[^.]*\bwas (an?|the)\b[^.]*\./.test(extract) && !/\(born/.test(firstSentence);
  const diedInExtract = /\b(died|death|passed away|deceased)\b/i.test(extract);
  const diedInDescription = /\b(died|death|deceased)\b/i.test(description);
  return hasDeathInBrackets || hasYearsInDescription || isPastTense || diedInExtract || diedInDescription;
}

function App() {
  const [page, setPage] = useState('home');
  const [auth, setAuth] = useState(false);
  const [user, setUser] = useState(null);
  const [watchlist, setWatchlist] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [results, setResults] = useState([]);
  const [searched, setSearched] = useState(false);
  const [wikiProfile, setWikiProfile] = useState(null);
  const [watchlistCheck, setWatchlistCheck] = useState(null);
  const [watchlistChecking, setWatchlistChecking] = useState(false);
  const [watchlistChecked, setWatchlistChecked] = useState(false);
  const [loading, setLoading] = useState(false);
  const [backendWaking, setBackendWaking] = useState(false);
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [sName, setSName] = useState('');
  const [sLoc, setSLoc] = useState('');
  const [sBirthYear, setSBirthYear] = useState('');
  const [nw, setNw] = useState({ name: '', location: '', birthYear: '' });
  const [editingId, setEditingId] = useState(null);
  const [editingName, setEditingName] = useState('');
  const [showDangerZone, setShowDangerZone] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  useEffect(() => {
    const t = localStorage.getItem('token');
    const u = localStorage.getItem('user');
    if (t && u) { setUser(JSON.parse(u)); setAuth(true); setPage('home'); loadWatchlist(); loadNotifications(); }
  }, []);

  const loadWatchlist = async () => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/watchlist`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      setWatchlist(await r.json());
    } catch (e) { console.error(e); }
  };

  const loadNotifications = async () => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/notifications`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      setNotifications(await r.json());
    } catch (e) { console.error(e); }
  };

  const doAuth = async () => {
    if (!email || !password) return;
    setLoading(true); setBackendWaking(false);
    const wakeTimer = setTimeout(() => setBackendWaking(true), 3000);
    try {
      const endpoint = mode === 'login' ? 'login' : 'register';
      const r = await fetch(`${API_BASE}/auth/${endpoint}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      clearTimeout(wakeTimer); setBackendWaking(false);
      if (!r.ok) { const err = await r.json(); throw new Error(err.detail || 'Auth failed'); }
      const data = await r.json();
      localStorage.setItem('token', data.access_token);
      const u = { email, id: '123', name: email.split('@')[0] };
      localStorage.setItem('user', JSON.stringify(u));
      setUser(u); setAuth(true); setPage('home');
      loadWatchlist(); loadNotifications();
    } catch (error) { clearTimeout(wakeTimer); setBackendWaking(false); alert('Error: ' + error.message); }
    finally { setLoading(false); }
  };

  const doLogout = () => {
    localStorage.clear(); setAuth(false); setUser(null);
    setWatchlist([]); setNotifications([]); setResults([]);
    setWikiProfile(null); setWatchlistCheck(null); setWatchlistChecked(false); setSearched(false);
  };

  const doDeleteAccount = async () => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/account`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      doLogout(); alert('Your account has been permanently deleted.');
    } catch (error) { alert('Error deleting account: ' + error.message); }
  };

  const clearSearch = () => { setSName(''); setSLoc(''); setSBirthYear(''); setWikiProfile(null); setResults([]); setSearched(false); };
  const clearWatchlistCheck = () => { setWatchlistCheck(null); setWatchlistChecked(false); setNw({ name: '', location: '', birthYear: '' }); };

  const fetchWikiProfile = async (name) => {
    try {
      const w = await (await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(toTitleCase(name))}`)).json();
      if (!w.extract) return null;
      const extract = w.extract || '', description = w.description || '', type = w.type || '';
      if (type === 'disambiguation') return { title: w.title.replace(' (disambiguation)', ''), extract, thumbnail: w.thumbnail?.source, birthDate: null, deathDate: null, description, isDisambiguation: true };
      const deceased = isDeceasedCheck(extract, description, w.death_date, type);
      return { title: w.title, extract, thumbnail: w.thumbnail?.source, birthDate: w.birth_date || null, deathDate: deceased ? (w.death_date || 'deceased') : null, description, isDisambiguation: false };
    } catch (e) { return null; }
  };

  const isOnWatchlist = (name) => watchlist.some(w => w.name.toLowerCase() === name.toLowerCase());

  const checkWatch = async () => {
    const name = toTitleCase(nw.name);
    if (!name.trim()) return;
    if (name.trim().split(' ').filter(p => p.length > 0).length < 2) { alert('Please enter a first and last name.'); return; }
    if (isOnWatchlist(name)) { alert(`${name} is already on your watchlist!`); return; }
    setWatchlistChecking(true); setWatchlistCheck(null); setWatchlistChecked(false);
    try { const profile = await fetchWikiProfile(name); setWatchlistCheck({ profile, name }); setWatchlistChecked(true); }
    catch (error) { setWatchlistCheck({ profile: null, name }); setWatchlistChecked(true); }
    finally { setWatchlistChecking(false); }
  };

  const confirmAddWatch = async () => {
    if (!watchlistCheck) return;
    setLoading(true);
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/watchlist`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name: watchlistCheck.name, location: nw.location, dob: nw.birthYear })
      });
      if (!r.ok) throw new Error('Failed');
      await loadWatchlist(); clearWatchlistCheck();
    } catch (error) { alert('Error: ' + error.message); }
    finally { setLoading(false); }
  };

  const addWatchFromSearch = async (profileTitle) => {
    if (isOnWatchlist(profileTitle)) { alert(`${profileTitle} is already on your watchlist!`); return; }
    setLoading(true);
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/watchlist`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name: profileTitle, location: '', dob: '' })
      });
      if (!r.ok) throw new Error('Failed');
      await loadWatchlist(); clearSearch();
    } catch (error) { alert('Error: ' + error.message); }
    finally { setLoading(false); }
  };

  const delWatch = async (id) => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/watchlist/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed');
      await loadWatchlist();
    } catch (error) { alert('Error: ' + error.message); }
  };

  const doSearch = async () => {
    if (!sName.trim()) return;
    if (sName.trim().split(' ').filter(p => p.length > 0).length < 2) { alert('Please enter a first and last name.'); return; }
    setLoading(true); setWikiProfile(null); setResults([]); setSearched(false);
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(`${API_BASE}/search`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name: toTitleCase(sName), location: sLoc || undefined, birth_year: sBirthYear || undefined })
      });
      if (!r.ok) throw new Error('Failed');
      setResults(await r.json());
      const profile = await fetchWikiProfile(sName);
      if (profile) setWikiProfile(profile);
      setSearched(true);
    } catch (error) { alert('Error: ' + error.message); }
    finally { setLoading(false); }
  };

  const unreadCount = notifications.length;
  const iClass = "w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 text-lg bg-white/60 text-gray-800 placeholder-gray-500";
  const cardClass = "bg-white/30 rounded-2xl p-6 shadow-lg backdrop-blur-sm border border-white/40";
  const homeCardStyle = {
    background: 'rgba(255,255,255,0.22)',
    backdropFilter: 'blur(8px)',
    border: '1px solid rgba(255,255,255,0.35)'
  };

  // Consistent page header component
  const PageHeader = ({ title, subtitle }) => (
    <div className="text-center mb-6">
      <h2 className="text-3xl font-bold text-gray-800">{title}</h2>
      <p className="text-lg text-gray-700 mt-2">{subtitle}</p>
    </div>
  );

  const WikiCard = ({ profile, showAddButton }) => {
    const alreadyWatching = isOnWatchlist(profile.title);
    const isDisambig = profile.isDisambiguation;
    return (
      <div className="rounded-2xl overflow-hidden border border-purple-300 shadow-lg">
        <div className={`px-5 py-3 flex items-center gap-3 ${profile.deathDate ? 'bg-gray-600' : isDisambig ? 'bg-yellow-500' : 'bg-green-600'}`}>
          <span className="text-white font-black tracking-widest text-sm">{profile.deathDate ? '⚫ DECEASED' : isDisambig ? '🟡 UNSURE' : '🟢 ALIVE'}</span>
          {profile.deathDate && profile.deathDate !== 'deceased' && <span className="text-white/80 text-xs ml-auto">Died: {profile.deathDate}</span>}
        </div>
        <div className="bg-indigo-950/80 p-5">
          <div className="flex gap-4 items-start mb-4">
            {profile.thumbnail ? <img src={profile.thumbnail} alt={profile.title} className="w-20 h-20 rounded-full object-cover border-2 border-purple-400/50 shrink-0" /> : <div className="w-20 h-20 rounded-full bg-purple-800/40 flex items-center justify-center shrink-0 text-3xl">👤</div>}
            <div className="flex-1">
              <h2 className="text-white text-xl font-bold mb-1">{profile.title}</h2>
              {!isDisambig && <p className="text-purple-300 text-sm italic mb-1">{profile.description}</p>}
              {profile.birthDate && <p className="text-purple-400 text-xs">🎂 Born: {profile.birthDate}</p>}
            </div>
          </div>
          {!isDisambig && profile.extract && <p className="text-purple-100 text-base leading-relaxed mb-4">{profile.extract.split('. ').slice(0, 3).join('. ') + '.'}</p>}
          {isDisambig && <div className="p-3 bg-yellow-500/20 border border-yellow-400/30 rounded-xl mb-4"><p className="text-yellow-200 text-sm text-center">⚠️ Multiple people share this name — try a middle name or location</p></div>}
          {profile.deathDate && <div className="p-3 bg-gray-500/30 border border-gray-400/30 rounded-xl mb-4"><p className="text-gray-200 text-sm text-center">⚫ This person has passed away — no need to add to watchlist</p></div>}
          {showAddButton && (
            <div className="space-y-2 mb-3">
              {!profile.deathDate && (alreadyWatching
                ? <button onClick={() => setPage('watchlist')} className="w-full py-3 bg-green-600/30 border border-green-400/40 text-green-200 rounded-xl text-sm text-center">✅ Already on your watchlist — tap to view</button>
                : !isDisambig && <button onClick={() => addWatchFromSearch(profile.title)} disabled={loading} className="w-full py-3 bg-purple-500 hover:bg-purple-600 text-white rounded-xl font-bold text-base flex items-center justify-center gap-2 disabled:opacity-50"><PlusIcon /> Add to Watchlist</button>
              )}
              <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-sm text-center">✕ Clear Search</button>
            </div>
          )}
          <div className="p-3 bg-purple-600/20 border border-purple-500/20 rounded-xl">
            <p className="text-purple-200 text-xs">💜 Data provided by Wikipedia. Memory Watch donates a portion of revenues to the Wikimedia Foundation.</p>
          </div>
        </div>
      </div>
    );
  };

  const WatchlistCheckCard = () => {
    if (!watchlistCheck) return null;
    const { profile, name } = watchlistCheck;
    const isDeceased = profile && profile.deathDate;
    const isDisambig = profile && profile.isDisambiguation;
    const notFound = !profile;
    return (
      <div className="rounded-2xl overflow-hidden border border-purple-300 shadow-lg">
        <div className={`px-5 py-3 ${isDeceased ? 'bg-gray-600' : isDisambig ? 'bg-yellow-500' : notFound ? 'bg-blue-600' : 'bg-green-600'}`}>
          <span className="text-white font-black tracking-widest text-sm">{isDeceased ? '⚫ DECEASED' : isDisambig ? '🟡 UNSURE' : notFound ? '🔍 NOT IN WIKIPEDIA' : '🟢 ALIVE'}</span>
        </div>
        <div className="bg-indigo-950/80 p-5">
          {profile && !notFound && (
            <>
              <div className="flex gap-4 items-start mb-4">
                {profile.thumbnail ? <img src={profile.thumbnail} alt={profile.title} className="w-20 h-20 rounded-full object-cover border-2 border-purple-400/50 shrink-0" /> : <div className="w-20 h-20 rounded-full bg-purple-800/40 flex items-center justify-center shrink-0 text-3xl">👤</div>}
                <div className="flex-1">

                <div><h3 className="font-bold text-gray-900 mb-2">5. Your Rights</h3><p>You may delete your account and all data from Settings at any time.</p></div>
                <div><h3 className="font-bold text-gray-900 mb-2">6. Children's Privacy</h3><p>This service is not directed at children under 13.</p></div>
                <div><h3 className="font-bold text-gray-900 mb-2">7. Third Party Services</h3><p>We use Render.com for hosting, Vercel for frontend delivery, Legacy for obituary data, and Wikipedia API for biographical data.</p></div>
                <div><h3 className="font-bold text-gray-900 mb-2">8. Contact</h3><a href="mailto:contact@memorywatch.com" className="text-purple-600">contact@memorywatch.com</a></div>
              </div>
              <BackButton onClick={() => setPage('settings')} />
            </div>
          </div>
        )}

      </div>

      <div style={{
        position: 'fixed', bottom: 0, left: 0, right: 0,
        backgroundColor: 'rgba(255,255,255,0.95)',
        backdropFilter: 'blur(8px)',
        borderTop: '1px solid #d1d5db',
        padding: '0.75rem 1rem',
        paddingBottom: 'max(0.75rem, env(safe-area-inset-bottom))',
      }}>
        <div className="flex justify-around max-w-3xl mx-auto">
          <button onClick={() => setPage('home')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'home' ? 'text-purple-500' : 'text-gray-500'}`}><HomeIcon /><span className="text-xs">Home</span></button>
          <button onClick={() => setPage('search')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'search' ? 'text-purple-500' : 'text-gray-500'}`}><SearchIcon /><span className="text-xs">Search</span></button>
          <button onClick={() => setPage('watchlist')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'watchlist' ? 'text-purple-500' : 'text-gray-500'}`}><HeartIcon /><span className="text-xs">Watchlist</span></button>
          <button onClick={() => setPage('notifications')} className={`flex flex-col items-center gap-1 px-4 py-2 relative ${page === 'notifications' ? 'text-purple-500' : 'text-gray-500'}`}>
            <BellIcon />
            {unreadCount > 0 && <span className="absolute top-1 right-2 bg-red-500 text-white text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-xs">Alerts</span>
          </button>
          <button onClick={() => setPage('settings')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'settings' ? 'text-purple-500' : 'text-gray-500'}`}><SettingsIcon /><span className="text-xs">Settings</span></button>
        </div>
      </div>
    </PageWrapper>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
