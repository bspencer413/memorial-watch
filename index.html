function isDeceasedCheck(extract, description, deathDate, type) {
  if (type === 'disambiguation') return false;

  var firstSentence = extract.split('.')[0];
  var hasDeathInBrackets = /\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(firstSentence);
  var hasYearsInDescription = /\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(description);
  var hasBornOnly = /\([^)]*born\s+\w+\s+\d+,\s+\d{4}\)/.test(firstSentence);
  if (hasBornOnly && !hasDeathInBrackets && !hasYearsInDescription) return false;
  var isPastTense = /^[^.]*\bwas (an?|the)\b[^.]*\./.test(extract) && !/\([^)]*born/.test(firstSentence) && !/born\s+\d{4}/.test(description);
  var diedInExtract = /\b(died|death|passed away|deceased)\b/i.test(extract);
  var diedInDescription = /\b(died|death|deceased)\b/i.test(description);
  return hasDeathInBrackets || hasYearsInDescription || isPastTense || diedInExtract || diedInDescription;
}
