const extractYear = (dateStr) => {
  if (!dateStr) return null;
  const m = String(dateStr).match(/\b(19|20)\d{2}\b/);
  return m ? m[0] : null;
};

const getSsdiCache = () => {
  try { return JSON.parse(localStorage.getItem(SSDI_CACHE_KEY) || '{}'); } catch(e) { return {}; }
};

const cacheSsdiRecord = (name, record) => {
  if (!name || !record) return;
  try {
    const cache = getSsdiCache();
    cache[name.trim().toLowerCase()] = {
      name: record.name,
      first_name: record.first_name,
      last_name: record.last_name,
      middle_name: record.middle_name,
      suffix: record.suffix,
      birth_date: record.birth_date,
      death_date: record.death_date,
      state: record.state
    };
    localStorage.setItem(SSDI_CACHE_KEY, JSON.stringify(cache));
  } catch(e) {}
};

const getCachedSsdi = (name) => {
  if (!name) return null;
  try {
    const cache = getSsdiCache();
    return cache[name.trim().toLowerCase()] || null;
  } catch(e) { return null; }
};

const getCachedSsdiFlexible = (name) => {
  if (!name) return null;
  var hit = getCachedSsdi(name);
  if (hit) return hit;
  var normalized = normalizeForWiki(name);
  if (normalized && normalized.toLowerCase() !== name.trim().toLowerCase()) {
    hit = getCachedSsdi(normalized);
    if (hit) return hit;
  }
  try {
    var cache = getSsdiCache();
    var parts = name.trim().toLowerCase().split(/\s+/);
    var nameFirst = parts[0] || '';
    var nameLast = parts[parts.length - 1] || '';
    var keys = Object.keys(cache);
    for (var i = 0; i < keys.length; i++) {
      var kparts = keys[i].split(/\s+/);
      var kFirst = kparts[0] || '';
      var kLast = kparts[kparts.length - 1] || '';
      if (fuzzyMatch(nameFirst, kFirst) && fuzzyMatch(nameLast, kLast)) return cache[keys[i]];
    }
  } catch(e) {}
  return null;
};

const toTitleCase = (str) => {
  if (!str) return str;
  return str
    .replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase())
    .replace(/'\w/g, (txt) => txt.toUpperCase());
};

const normalizeForWiki = (name) => {
  if (!name) return name;
  name = name.trim();
  if (name.indexOf(',') > -1) {
    const parts = name.split(',');
    name = parts[1].trim() + ' ' + parts[0].trim();
  }
  const words = name.split(/\s+/).filter(w => {
    const stripped = w.replace(/\./g, '');
    return stripped.length > 1;
  });
  if (words.length >= 3) return toTitleCase(words[0] + ' ' + words[words.length - 1]);
  return toTitleCase(words.join(' '));
};

const addInitialPeriods = (name) => {
  if (!name) return name;
  return name.trim().split(/\s+/).map((word, i, arr) => {
    if (word.length === 1 && /[A-Za-z]/.test(word) && i > 0 && i < arr.length - 1) return word + '.';
    return word;
  }).join(' ');
};

const fuzzyMatch = (a, b) => {
  if (!a || !b) return false;
  a = a.toLowerCase().trim(); b = b.toLowerCase().trim();
  if (a === b) return true;
  if (a.startsWith(b) || b.startsWith(a)) return true;
  const longer = a.length >= b.length ? a : b;
  const shorter = a.length < b.length ? a : b;
  if (longer.length === 0) return true;
  let matches = 0;
  for (let i = 0; i < shorter.length; i++) { if (longer.indexOf(shorter[i]) !== -1) matches++; }
  return (matches / longer.length) >= 0.8;
};

const parseBirthYear = (birth_date) => {
  if (!birth_date) return 9999;
  var yr = parseInt(extractYear(birth_date) || '0');
  return yr > 0 ? yr : 9999;
};

const scoreResult = (result, searchFirst, searchMiddle, searchLast, searchBirthYear, searchSuffix) => {
  let score = 0;
  const rFirst = (result.first_name || '').toUpperCase();
  const rMiddle = (result.middle_name || '').toUpperCase();
  const rLast = (result.last_name || '').toUpperCase();
  const rSuffix = (result.suffix || '').toUpperCase();
  const rDob = (result.birth_date || '');
  const sFirst = (searchFirst || '').toUpperCase();
  const sMiddle = (searchMiddle || '').toUpperCase().replace('.','');
  const sLast = (searchLast || '').toUpperCase();
  const sSuffix = (searchSuffix || '').toUpperCase();
  const lastNameOnly = !sFirst;
  score += lastNameOnly ? 50 : 30;
  if (sFirst) {
    if (rFirst === sFirst) score += 30;
    else if (rFirst.startsWith(sFirst) && rFirst.length <= sFirst.length + 1) score += 15;
  }
  if (sMiddle && rMiddle) {
    if (rMiddle === sMiddle || rMiddle.startsWith(sMiddle) || sMiddle.startsWith(rMiddle)) score += 30;
  }
  if (searchBirthYear && rDob) { if (rDob.includes(searchBirthYear)) score += 15; }
  if (sSuffix && rSuffix && rSuffix === sSuffix) score += 5;
  return score;
};

const confidenceLabel = (score) => {
  if (score >= 90) return 'Probable Match';
  if (score >= 60) return 'Potential Match';

function isDeceasedCheck(extract, description, deathDate, type) {
  if (type === 'disambiguation') return false;
  if (deathDate) return true;
  const firstSentence = extract ? extract.split('.')[0] : '';
  const hasDeathInBrackets = /\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(firstSentence);
  const hasYearsInDescription = /\(\d{4}\s*[-\u2013\u2014]+\s*\d{4}\)/.test(description);
  const hasBornOnly = /\([^)]*born\s+\w+\s+\d+,\s+\d{4}\)/.test(firstSentence) || /\([^)]*born\s+\d{4}\)/.test(firstSentence);
  if (hasBornOnly) return false;
  const isPastTense = /^[^.]*\bwas (an?|the)\b[^.]*\./.test(extract) && !/\([^)]*born/.test(firstSentence) && !/born\s+\d{4}/.test(description) && !/\b(serves|serving|since|has served|has been|retired)\b/i.test(extract);
  const diedInFirstSentence = /\b(died|passed away|deceased)\b/i.test(firstSentence);
  const diedInDescription = /\b(died|passed away|deceased)\b/i.test(description);
  const yearRangeInDesc = /\(\d{4}[-\u2013\u2014]+\d{4}\)/.test(description) && /\b(died|death|deceased)\b/i.test(description);
  console.log('panetta:', hasDeathInBrackets, isPastTense, diedInFirstSentence, diedInDescription, hasBornOnly, hasYearsInDescription);
  return hasDeathInBrackets || isPastTense || diedInFirstSentence || diedInDescription;
}

      const page = Object.values(pages)[0];
      if (!page || page.missing !== undefined) return null;
      const title = page.title || name;
      const extract = page.extract || '';
      const categories = (page.categories || []).map(cat => cat.title || '');
      const deathFromCategory = categories.some(cat => /deaths|murdered|executed/i.test(cat));
      const isDisambig = !!(page.pageprops && page.pageprops.disambiguation !== undefined) || title.toLowerCase().includes('(disambiguation)');
      if (isDisambig) return { type: 'disambiguation', isDisambiguation: true, title: title.replace(/ \(disambiguation\)/i, ''), extract, matches: [] };
      let thumbnail = null, birthDate = null, deathDate = null, description = '';
      try {
        const sum = await (await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title))).json();
        thumbnail = sum.thumbnail ? sum.thumbnail.source : null;

        deathDate = sum.death_date || null;
        description = sum.description || '';
        const isNotPerson = /\b(film|movie|album|song|television|TV series|video game|book|novel)\b/i.test(description) && !birthDate;
        if (isNotPerson) return null;
      } catch(e) {}
      if (!deathDate || deathDate.length <= 4) {
        const months = 'January|February|March|April|May|June|July|August|September|October|November|December';
        const dateMatches = extract.match(new RegExp('(?:' + months + ') [0-9]{1,2}, [0-9]{4}', 'g'));
        if (dateMatches && dateMatches.length >= 2) deathDate = dateMatches[dateMatches.length - 1];
        else if (dateMatches && dateMatches.length === 1 && /died|passed|\u2013|\u2014/.test(extract.split('.')[0])) deathDate = dateMatches[0];
}
      if (deathDate && !deathFromCategory) {

        if (!yr || yr < 1900 || yr > 2030) deathDate = null;
      }
      const isLikelyAlive =/\b(serving|serves|since|current|retired)\b/i.test(description) || /\bretired\b/i.test(extract)|| /chief justice|associate justice/i.test(description) || /\bborn\b/i.test(extract.split('.')[0]);
      if (isLikelyAlive) deathDate = null;

  const fetchDisambigMatches = async (title) => {
    try {
      const url = 'https://en.wikipedia.org/w/api.php?action=parse&page=' + encodeURIComponent(title) + '&prop=links&format=json&origin=*';
      const data = await (await fetch(url)).json();
      const links = (data.parse && data.parse.links) ? data.parse.links : [];
      const personLinks = links.filter(l => l.ns === 0 && l['*'] && l['*'].length > 2).map(l => l['*']).slice(0, 20);
      const results = [];
      const titleParts = title.trim().split(/\s+/);
      const searchLastName = titleParts[titleParts.length - 1].toUpperCase();
      for (const link of personLinks) {
        const profile = await fetchWikiAction(link);
        if (!profile || profile.isDisambiguation || !profile.extract) continue;
        const linkLastName = profile.title ? profile.title.trim().split(/\s+/).pop().toUpperCase() : '';
        if (searchLastName.length > 2 && linkLastName !== searchLastName) continue;
        const desc = (profile.description || '').toLowerCase();
        const extract = (profile.extract || '').toLowerCase();
        const looksLikePerson = profile.birthDate || profile.deathDate ||
          /\b(born|died|american|british|politician|actor|actress|singer|musician|athlete|author|writer|director|businessman|scientist|lawyer|doctor|physician|soldier|general|president|senator|governor|mayor)\b/.test(desc + ' ' + extract);

        results.push(profile);
        if (results.length >= 6) break;
      }

    } catch(e) { return []; }

                <div className="space-y-2">
                  <ClearableInput value={nw.name} onChange={(e) => setNw(Object.assign({}, nw, { name: e.target.value }))} onBlur={(e) => setNw(Object.assign({}, nw, { name: toTitleCase(e.target.value.trim()) }))} onKeyPress={(e) => e.key === 'Enter' && checkWatch()} placeholder="First and Last Name" inputClass={iClass} />
                  <button id="mw-search-btn" onFocus={() => { setTimeout(() => { var el = document.getElementById('mw-search-btn'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 350); }} onClick={checkWatch} disabled={watchlistChecking} className="w-full py-3 bg-purple-600 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-2xl font-bold">
                    <SearchIcon /> {watchlistChecking ? 'Searching...' : 'Find Out'}
                  </button>
                  {!showMoreFields && (
                    <button onClick={() => setShowMoreFields(true)} className="w-full py-2 bg-gray-800/60 border border-purple-900/30 text-purple-400 text-xl text-center rounded-lg">Add more details (optional)</button>
                  )}
                  {showMoreFields && (
                    <>
                      <ClearableInput value={nw.middle} onChange={(e) => setNw(Object.assign({}, nw, { middle: e.target.value }))} onBlur={(e) => setNw(Object.assign({}, nw, { middle: e.target.value.trim() }))} onKeyPress={(e) => e.key === 'Enter' && checkWatch()} placeholder="Middle name or initial (optional)" inputClass={iClass} />
                      <ClearableInput value={nw.suffix} onChange={(e) => setNw(Object.assign({}, nw, { suffix: e.target.value }))} onKeyPress={(e) => e.key === 'Enter' && checkWatch()} placeholder="Suffix: Jr., Sr., MD, III" inputClass={iClass} />
                      <ClearableInput value={nw.birthYear} onChange={(e) => setNw(Object.assign({}, nw, { birthYear: e.target.value.replace(/\D/g, '').slice(0, 4) }))} onKeyPress={(e) => e.key === 'Enter' && checkWatch()} placeholder="Birth year (optional)" maxLength={4} inputClass={iClass} numeric={true} />
                      <ClearableInput value={nw.location} onChange={(e) => setNw(Object.assign({}, nw, { location: e.target.value }))} onKeyPress={(e) => e.key === 'Enter' && checkWatch()} placeholder="Location — City, State or Country" inputClass={iClass} />
                    </>
                  )}
                  
                  <p className="text-gray-400 text-sm text-center">Results are based on publicly available records.</p>
                </div>
              ) : (
                <WatchlistCheckCard />
              )}
            </div>
          </div>
        )}

        {page === 'memories' && (
          <div className="space-y-3" style={{ paddingTop: "1rem" }}>
            <div className={cardClass}>
              <CardPageHeader title="Memories" subtitle="People you have saved" />
              {watchlist.filter(w => w.is_deceased).length === 0 ? (
                <div className="text-center py-6">
                  <p className="text-gray-300 text-xl leading-relaxed">Search for a name and save them here for future reference.</p>
                </div>
              ) : (
                <div className="space-y-3">
                  <p className="text-gray-400 text-lg text-center mb-1">Tap a name to see saved info</p>
                  {watchlist.filter(w => w.is_deceased).map(w => {
                    const confirmedDeceased = !!(w.death_year);
                    const statusText = confirmedDeceased ? ('Passed Away — DOD: ' + w.death_year) : 'Saved';
                    return (
                      <div key={w.id} className="p-4 bg-gray-900/70 rounded-lg border border-gray-600/50">
                        <div className="flex items-center justify-between">
                          <div className="flex-1 min-w-0">
                            <button onClick={() => openWatchlistDrawer(w)} className="text-left w-full">
                              <h3 className="font-semibold text-2xl text-white underline decoration-dotted truncate">{w.name}</h3>
                            </button>
                            <span className="text-xl text-gray-400 font-bold">{statusText}</span>
                            {w.location && <p className="text-gray-500 text-lg">{w.location}</p>}
                          </div>
                          <button onClick={() => delWatch(w.id)} className="p-2 text-purple-500 hover:bg-purple-900/30 rounded-lg ml-2 shrink-0"><TrashIcon /></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'notifications' && (
          <div className="space-y-3" style={{ paddingTop: "1rem" }}>
            <div className={cardClass}>
              <CardPageHeader title="Alerts" subtitle="New info about people on your Watchlist" />
              {notifications.length === 0 ? (
                <div className="text-center py-4">
                  <p className="text-white font-bold text-2xl">No alerts yet</p>
                  <p className="text-gray-200 text-xl mt-1">We'll alert you when there is new info about someone on your Watchlist</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {notifications.map(n => (
                    <div key={n.id} className="p-3 bg-purple-950/50 border border-purple-800 rounded-xl">
                      <h3 className="font-bold text-white text-xl mb-1">{n.name}</h3>
                      <p className="text-gray-300 text-xl">{n.message}</p>
                      <p className="text-gray-500 text-xl mt-1 mb-2">{new Date(n.created_at).toLocaleDateString()}</p>
                      <div className="flex gap-2">
                        <button onClick={() => viewAlert(n)} className="flex-1 py-2 bg-purple-700/50 border border-purple-600/50 text-white rounded-lg text-xl font-bold">View</button>
                        <button onClick={() => keepAlert(n.id, n.watchlist_id, n.name)} className="flex-1 py-2 bg-gray-700/50 border border-gray-600/50 text-gray-200 rounded-lg text-base font-bold">
                          Keep<span className="block text-gray-400 text-xs font-normal leading-tight">Save to Memories</span>
                        </button>
                        <button onClick={() => dismissAlert2(n.id, n.watchlist_id)} className="flex-1 py-2 bg-transparent border border-purple-900/50 text-purple-400 rounded-lg text-base">
                          Dismiss<span className="block text-purple-600 text-xs leading-tight">Remove All</span>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'about' && (
          <div className="space-y-4 pb-8" style={{ paddingTop: '1rem' }}>
            <div className={cardClass}>
              <div className="mb-3 pb-2 border-b border-purple-900/30 text-center">
                <h2 className="text-4xl font-black text-white tracking-wide">About</h2>
                <h2 className="text-4xl font-black text-white tracking-wide">Memory Watch</h2>
              </div>
              <p className="text-purple-300 italic text-xl text-center mb-3">v{APP_VERSION}</p>
              <div className="flex items-center gap-4 mb-4">
                <img src={BILL_PHOTO} alt="Bill Spencer" className="w-14 h-14 rounded-full object-cover border-2 border-purple-600 shadow-lg shrink-0" />
                <div>
                  <p className="font-bold text-white text-xl">Bill Spencer</p>
                  <p className="text-purple-400 italic text-xl">Founder</p>
                  <a href="mailto:bspencer413@me.com" className="text-purple-400 text-xl mt-1 block">bspencer413@me.com</a>
                </div>
              </div>
              <p className="text-purple-200 text-2xl font-bold italic mb-3">Whatever happened to...</p>
              <div className="space-y-3 text-gray-200 text-xl leading-relaxed">
                <p>Old friends. Family. People we once knew of. Are they still out there? As we get older, we wonder. </p>
                <p>"Google it," they say. But that's easier said than done.</p>
                <p>So we built Memory Watch to help you Find Out — a dignified, simple way to see whatever may have happened.</p>
                <p>Memory Watch monitors public information, not individuals.  No ads. No paywalls. Just simple respectful answers.</p>
              </div>
            </div>
            <div className={cardClass}>
              <h3 className="text-white text-2xl font-bold mb-4 text-center">How it works</h3>
              <div className="space-y-4">
                <div className="flex gap-3 items-start"><span className="text-purple-400 text-2xl font-black w-7 shrink-0">1.</span><p className="text-gray-300 text-xl">Enter a name to search public records to see if they're still with us.</p></div>
                <div className="flex gap-3 items-start"><span className="text-purple-400 text-2xl font-black w-7 shrink-0">2.</span><p className="text-gray-300 text-xl">If Likely Alive or no information is found, you can add them to your Watchlist to get Alerts with new information.</p></div>
                <div className="flex gap-3 items-start"><span className="text-purple-400 text-2xl font-black w-7 shrink-0">3.</span><p className="text-gray-300 text-xl">If they are no longer with us, you can save them to your Memories for future reference.</p></div>
                <div className="flex gap-3 items-start"><span className="text-purple-400 text-2xl font-black w-7 shrink-0">4.</span><p className="text-gray-300 text-xl">Memory Watch is free to use. Future features may include optional upgrades.</p></div>
              </div>
            </div>
            <div className={cardClass}>
              <h3 className="text-white text-2xl font-bold mb-3">About Alerts</h3>
              <div className="space-y-2 text-gray-200 text-xl leading-relaxed">
                <p>The Watchlist is a core feature of  Memory Watch.  Your Watchlist lets you follow updates from public records for people you care about.  If the person is Likely Alive, or no information is found, add them to your Watchlist.  When we find new information about them, you'll see an Alert in the app.</p>
                <p><strong className="text-white">View</strong> — see the latest information.</p>
                <p><strong className="text-white">Keep</strong> — add this person to your Memories.</p>
                <p><strong className="text-white">Dismiss</strong> — remove this alert.</p>
              </div>
            </div>
            <div className={cardClass}>
              <h3 className="font-bold text-white mb-1 text-2xl">Privacy Policy</h3>
              <p className="text-gray-400 text-xl mb-3">Last updated: March 2026</p>
              <div className="space-y-3 text-gray-200 text-xl leading-relaxed">
                <p><strong className="text-white">We collect:</strong> your email address, watchlist names, search queries, and anonymous usage data.</p>
                <p><strong className="text-white">How we use it:</strong> We do not sell your personal information. Ever.</p>
                <p><strong className="text-white">Data sources:</strong> Information is based on publicly available sources, including Wikipedia and the Social Security Death Index.</p>
                <p><strong className="text-white">Your rights:</strong> You may delete your account and all associated data at any time.</p>
                <p><strong className="text-white">Minor protection:</strong> Memory Watch is not intended for searching individuals under 18 years of age.</p>
                <p><strong className="text-white">Disclaimer:</strong> Information is based on publicly available sources. It may not be complete or up to date. Memory Watch does not provide real-time tracking or monitoring of individuals.</p>
                <a href="mailto:bspencer413@me.com" className="text-purple-400 text-xl">bspencer413@me.com</a>
              </div>
            </div>
            <div className="px-1 space-y-3 pb-2">
              <div className="p-3 bg-black/30 rounded-xl"><p className="font-medium text-gray-200 text-xl text-center">{user && user.email}</p></div>
              <button onClick={doLogout} className="w-full py-4 bg-purple-700 hover:bg-purple-800 text-white rounded-xl text-2xl font-bold">Sign Out</button>
              <button onClick={() => setShowDangerZone(!showDangerZone)} className="w-full py-3 text-gray-500 text-xl text-center">{showDangerZone ? 'Hide' : 'Account Removal'}</button>
              {showDangerZone && (
                <div className="space-y-3">
                  {!showDeleteConfirm
                    ? <button onClick={() => setShowDeleteConfirm(true)} className="w-full py-4 bg-gray-900/70 border border-purple-800 text-purple-400 rounded-xl text-xl">Delete Account</button>
                    : <div className="bg-purple-950/90 border border-purple-800 rounded-2xl p-5 space-y-3">
                        <h3 className="font-bold text-purple-400 text-xl">Are you sure?</h3>
                        <p className="text-purple-300 text-xl">This will permanently delete your account and all data.</p>
                        <button onClick={doDeleteAccount} className="w-full py-4 bg-purple-700 text-white rounded-xl font-bold text-xl">Yes, Permanently Delete My Account</button>
                        <button onClick={() => { setShowDeleteConfirm(false); setShowDangerZone(false); }} className="w-full py-4 bg-gray-800 border border-gray-600 text-gray-300 rounded-xl font-medium text-xl">Cancel</button>
                      </div>
                  }
                </div>
              )}
            </div>
            <button onClick={injectTestAlert} className="w-full py-2 text-gray-600 text-sm text-center">Test Alert</button>
            <p className="text-white/30 text-center text-sm pb-4">v{APP_VERSION}</p>
          </div>
        )}

      </div>

      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(5,0,15,0.95)', backdropFilter: 'blur(8px)', borderTop: '1px solid #4C1D95', padding: '0.5rem 1rem', paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-around max-w-sm mx-auto">
          <button onClick={() => { clearWatchlistCheck(); setPage('search'); }} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'search' ? 'text-purple-400' : 'text-gray-400')}>
            <SearchIcon /><span className="text-xl font-medium">Search</span>
          </button>
          <button onClick={() => setPage('watchlist')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'watchlist' ? 'text-purple-400' : 'text-gray-400')}>
            <HeartIcon /><span className="text-xl font-medium">Watchlist</span>
          </button>
          <button onClick={() => setPage('memories')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'memories' ? 'text-purple-400' : 'text-gray-400')}>
            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            <span className="text-xl font-medium">Memories</span>
          </button>
          <button onClick={() => setPage('about')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'about' ? 'text-purple-400' : 'text-gray-400')}>
            <InfoIcon /><span className="text-xl font-medium">Info</span>
          </button>
          <button onClick={() => setPage('notifications')} className={'flex flex-col items-center gap-0.5 px-1 py-1 relative ' + (page === 'notifications' ? 'text-purple-400' : 'text-gray-400')}>
            <BellIcon red={unreadCount > 0} />
            {unreadCount > 0 && <span className="absolute top-0 right-1 bg-purple-600 text-white text-xl font-bold rounded-full w-4 h-4 flex items-center justify-center">{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-xl font-medium" style={unreadCount > 0 ? {color:'#7C3AED'} : {}}>Alerts</span>
          </button>
        </div>
        <p className="text-center text-gray-600 text-xs mt-1" style={{display: page === 'search' ? 'none' : 'block'}}>app v{APP_VERSION} | api v{apiVersion}</p>
      </div>
    </PageWrapper>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
