<body style="margin:0;padding:0;min-height:100vh;min-width:100vw;">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const API_BASE = 'https://memorial-watch-backend-2.onrender.com';
const SUNSET_BG = 'https://raw.githubusercontent.com/Bspencer413/Memorial-watch/main/Sunset.jpeg';
const BILL_PHOTO = 'https://raw.githubusercontent.com/Bspencer413/Memorial-watch/main/Bill.jpeg';
const APP_VERSION = '0.9.1';

const HomeIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
  </svg>
);

const HeartIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
  </svg>
);

const SearchIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
);

const SettingsIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
  </svg>
);

const PlusIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
  </svg>
);

const TrashIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
  </svg>
);

const CheckIcon = () => (
  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
  </svg>
);

const EyeIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
  </svg>
);

const EyeOffIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
  </svg>
);

const BackButton = ({ onClick }) => (
  <button onClick={onClick} className="text-purple-500 flex items-center gap-1 text-sm py-2">
    ← Back to Settings
  </button>
);

const PageWrapper = ({ children }) => (
  <div style={{
    minHeight: '100vh',
    width: '100%',
    position: 'relative',
    paddingBottom: '5rem',
    backgroundImage: `url(${SUNSET_BG})`,
    backgroundSize: 'cover',
    backgroundPosition: 'center top',
    backgroundRepeat: 'no-repeat',
    backgroundAttachment: 'scroll',
  }}>
    <div style={{
      position: 'absolute',
      top: 0, left: 0, right: 0, bottom: 0,
      backgroundColor: 'rgba(249,250,251,0.15)',
    }} />
    <div style={{ position: 'relative', zIndex: 10 }}>
      {children}
    </div>
  </div>
);

function isDeceasedCheck(extract, description, deathDate, type) {
  if (type === 'disambiguation') return false;
  const firstSentence = extract.split('.')[0];
  const hasDeathInBrackets = /\(\d{4}\s*[-–—]\s*\d{4}\)/.test(firstSentence);
  const hasYearsInDescription = /\(\d{4}\s*[-–—]\s*\d{4}\)/.test(description);
  const isPastTense = /^[^.]*\bwas (an?|the)\b[^.]*\./.test(extract) && !/\(born/.test(firstSentence);
  const diedInExtract = /\b(died|death|passed away|deceased)\b/i.test(extract);
  const diedInDescription = /\b(died|death|deceased)\b/i.test(description);
  const hasDeathDate = !!deathDate;
  return hasDeathDate || hasDeathInBrackets || hasYearsInDescription || isPastTense || diedInExtract || diedInDescription;
}

function App() {
  const [page, setPage] = useState('home');
  const [auth, setAuth] = useState(false);
  const [user, setUser] = useState(null);
  const [watchlist, setWatchlist] = useState([]);
  const [results, setResults] = useState([]);
  const [wikiProfile, setWikiProfile] = useState(null);
  const [watchlistWiki, setWatchlistWiki] = useState(null);
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [sName, setSName] = useState('');
  const [sLoc, setSLoc] = useState('');
  const [nw, setNw] = useState({ name: '', location: '', dob: '' });
  const [showDangerZone, setShowDangerZone] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  useEffect(() => {
    const t = localStorage.getItem('token');
    const u = localStorage.getItem('user');
    if (t && u) {
      setUser(JSON.parse(u));
      setAuth(true);
      setPage('home');
      loadWatchlist();
    }
  }, []);

  const loadWatchlist = async () => {
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/watchlist`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed');
      const data = await response.json();
      setWatchlist(data);
    } catch (error) {
      console.error(error);
    }
  };

  const doAuth = async () => {
    if (!email || !password) return;
    setLoading(true);
    try {
      const endpoint = mode === 'login' ? 'login' : 'register';
      const response = await fetch(`${API_BASE}/auth/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Auth failed');
      }
      const data = await response.json();
      localStorage.setItem('token', data.access_token);
      const u = { email, id: '123', name: email.split('@')[0] };
      localStorage.setItem('user', JSON.stringify(u));
      setUser(u);
      setAuth(true);
      setPage('home');
      loadWatchlist();
    } catch (error) {
      alert('Error: ' + error.message);
    } finally {
      setLoading(false);
    }
  };

  const doLogout = () => {
    localStorage.clear();
    setAuth(false);
    setUser(null);
    setWatchlist([]);
    setResults([]);
    setWikiProfile(null);
    setWatchlistWiki(null);
  };

  const doDeleteAccount = async () => {
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/account`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed');
      doLogout();
      alert('Your account has been permanently deleted.');
    } catch (error) {
      alert('Error deleting account: ' + error.message);
    }
  };

  const clearSearch = () => {
    setSName('');
    setSLoc('');
    setWikiProfile(null);
    setResults([]);
  };

  const fetchWikiProfile = async (name) => {
    try {
      const wikiRes = await fetch(
        `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
      );
      const wikiData = await wikiRes.json();
      if (!wikiData.extract) return null;
      const extract = wikiData.extract || '';
      const description = wikiData.description || '';
      const type = wikiData.type || '';
      const deceased = isDeceasedCheck(extract, description, wikiData.death_date, type);
      return {
        title: wikiData.title,
        extract: extract,
        thumbnail: wikiData.thumbnail?.source,
        birthDate: wikiData.birth_date || null,
        deathDate: deceased ? (wikiData.death_date || 'deceased') : null,
        description: description,
        isDisambiguation: type === 'disambiguation',
      };
    } catch (e) {
      return null;
    }
  };

  const isOnWatchlist = (name) => {
    return watchlist.some(w => w.name.toLowerCase() === name.toLowerCase());
  };

  const addWatch = async (nameOverride) => {
    const name = nameOverride || nw.name;
    if (!name.trim()) return;
    if (isOnWatchlist(name)) {
      alert(`${name} is already on your watchlist!`);
      return;
    }
    setLoading(true);
    setWatchlistWiki(null);
    try {
      const profile = await fetchWikiProfile(name);
      if (profile) {
        setWatchlistWiki(profile);
        if (profile.deathDate) {
          setNw({ name: '', location: '', dob: '' });
          setLoading(false);
          return;
        }
      }
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/watchlist`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(nameOverride ? { name: nameOverride, location: '', dob: '' } : nw)
      });
      if (!response.ok) throw new Error('Failed');
      await loadWatchlist();
      if (!nameOverride) setNw({ name: '', location: '', dob: '' });
      clearSearch();
      setWatchlistWiki(null);
    } catch (error) {
      alert('Error: ' + error.message);
    } finally {
      setLoading(false);
    }
  };

  const delWatch = async (id) => {
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/watchlist/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed');
      await loadWatchlist();
    } catch (error) {
      alert('Error: ' + error.message);
    }
  };

  const doSearch = async () => {
    if (!sName.trim()) return;
    setLoading(true);
    setWikiProfile(null);
    setResults([]);
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/search`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ name: sName, location: sLoc || undefined })
      });
      if (!response.ok) throw new Error('Failed');
      const data = await response.json();
      setResults(data);
      const profile = await fetchWikiProfile(sName);
      if (profile) setWikiProfile(profile);
    } catch (error) {
      alert('Error: ' + error.message);
    } finally {
      setLoading(false);
    }
  };

  const WikiCard = ({ profile, showAddButton }) => {
    const alreadyWatching = isOnWatchlist(profile.title);
    const isDisambig = profile.isDisambiguation;
    return (
      <div className="rounded-2xl overflow-hidden border border-purple-300 shadow-lg">
        <div className={`px-5 py-3 flex items-center gap-3 ${profile.deathDate ? 'bg-gray-600' : isDisambig ? 'bg-yellow-500' : 'bg-green-600'}`}>
          <span className="text-white font-black tracking-widest text-sm">
            {profile.deathDate ? '⚫ DECEASED' : isDisambig ? '🟡 UNSURE' : '🟢 ALIVE'}
          </span>
          {profile.deathDate && profile.deathDate !== 'deceased' && (
            <span className="text-white/80 text-xs ml-auto">Died: {profile.deathDate}</span>
          )}
        </div>
        <div className="bg-indigo-950 p-5">
          <div className="flex gap-4 items-start mb-4">
            {profile.thumbnail ? (
              <img src={profile.thumbnail} alt={profile.title}
                className="w-20 h-20 rounded-full object-cover border-2 border-purple-400/50 shrink-0" />
            ) : (
              <div className="w-20 h-20 rounded-full bg-purple-800/40 flex items-center justify-center shrink-0 text-3xl">👤</div>
            )}
            <div className="flex-1">
              <h2 className="text-white text-xl font-bold mb-1">{isDisambig ? profile.title.replace(' (disambiguation)', '') : profile.title}</h2>
              {!isDisambig && <p className="text-purple-300 text-sm italic mb-1">{profile.description}</p>}
              {profile.birthDate && (
                <p className="text-purple-400 text-xs">🎂 Born: {profile.birthDate}</p>
              )}
            </div>
          </div>
          {isDisambig ? (
            <div className="p-3 bg-yellow-500/20 border border-yellow-400/30 rounded-xl mb-3">
              <p className="text-yellow-200 text-sm text-center">
                ⚠️ Multiple people share this name — try adding a middle name or location for a more specific result
              </p>
            </div>
          ) : (
            <p className="text-purple-100 text-base leading-relaxed mb-4">
              {profile.extract?.split('. ').slice(0, 3).join('. ') + '.'}
            </p>
          )}
          {profile.deathDate && (
            <div className="p-3 bg-gray-500/30 border border-gray-400/30 rounded-xl mb-3">
              <p className="text-gray-200 text-sm text-center">
                ⚫ This person has passed away — no need to add to watchlist
              </p>
            </div>
          )}
          {showAddButton && (
            <div className="space-y-2 mb-3">
              {!profile.deathDate && (
                alreadyWatching ? (
                  <button onClick={() => setPage('watchlist')}
                    className="w-full py-3 bg-green-600/30 border border-green-400/40 text-green-200 rounded-xl text-sm text-center">
                    ✅ Already on your watchlist — tap to view
                  </button>
                ) : (
                  !isDisambig && (
                    <button onClick={() => addWatch(profile.title)}
                      className="w-full py-3 bg-purple-500 hover:bg-purple-600 text-white rounded-xl font-bold text-base flex items-center justify-center gap-2">
                      <PlusIcon /> Add to Watchlist
                    </button>
                  )
                )
              )}
              <button onClick={clearSearch}
                className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-sm text-center">
                ✕ Clear Search
              </button>
            </div>
          )}
          <div className="p-3 bg-purple-600/20 border border-purple-500/20 rounded-xl">
            <p className="text-purple-200 text-xs leading-relaxed">
              💜 Data provided by Wikipedia. Dead or Alive donates a portion of revenues to the Wikimedia Foundation.
            </p>
          </div>
        </div>
      </div>
    );
  };

  if (!auth) {
    return (
      <div style={{
        minHeight: '100vh',
        width: '100%',
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'flex-end',
        paddingBottom: '15rem',
        backgroundImage: 'url(https://raw.githubusercontent.com/Bspencer413/Memorial-watch/main/IMG_0437.png)',
        backgroundSize: 'cover',
        backgroundPosition: 'center top',
        backgroundRepeat: 'no-repeat',
      }}>
        <div className="bg-black/40 backdrop-blur-sm p-3 space-y-2">
          <div className="flex gap-3 mb-2">
            <button onClick={() => setMode('login')}
              className={`flex-1 py-3 rounded-xl font-bold text-xl ${mode === 'login' ? 'bg-purple-500 text-white' : 'bg-white/20 text-white/70'}`}>
              Login
            </button>
            <button onClick={() => setMode('register')}
              className={`flex-1 py-3 rounded-xl font-bold text-xl ${mode === 'register' ? 'bg-purple-500 text-white' : 'bg-white/20 text-white/70'}`}>
              Register
            </button>
          </div>
          <input type="email" placeholder="Email" value={email}
            onChange={(e) => setEmail(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && doAuth()}
            className="w-full px-5 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-purple-500 text-xl" />
          <div className="relative">
            <input type={showPassword ? 'text' : 'password'} placeholder="Password" value={password}
              onChange={(e) => setPassword(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && doAuth()}
              className="w-full px-5 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-purple-500 text-xl" />
            <button onClick={() => setShowPassword(!showPassword)}
              className="absolute right-4 top-1/2 -translate-y-1/2 text-white/60">
              {showPassword ? <EyeOffIcon /> : <EyeIcon />}
            </button>
          </div>
          <button onClick={doAuth} disabled={loading}
            className="w-full py-4 bg-purple-500 hover:bg-purple-600 text-white font-bold rounded-xl disabled:opacity-50 text-xl tracking-wide">
            {loading ? 'Loading...' : mode === 'login' ? 'Login' : 'Create Account'}
          </button>
        </div>
      </div>
    );
  }

  return (
    <PageWrapper>
      <div className="max-w-md mx-auto p-4">

        {page === 'home' && (
          <div className="space-y-6">
            <div className="bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl p-6 text-white shadow-lg text-center">
              <h2 className="text-3xl font-bold mb-1">Dead or Alive</h2>
              <p className="text-2xl font-bold text-white/90 mb-3 tracking-wide">Memorial Watch</p>
              <p className="text-white/90">Welcome, {user?.name}! 👋</p>
              <p className="text-white/80 text-sm">Monitoring {watchlist.length} people</p>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <button onClick={() => setPage('watchlist')} className="bg-white/90 rounded-xl p-6 shadow-lg">
                <HeartIcon />
                <h3 className="font-semibold text-gray-800 mt-3">Watchlist</h3>
                <p className="text-sm text-gray-500">{watchlist.length} people</p>
              </button>
              <button onClick={() => setPage('search')} className="bg-white/90 rounded-xl p-6 shadow-lg">
                <SearchIcon />
                <h3 className="font-semibold text-gray-800 mt-3">Search</h3>
                <p className="text-sm text-gray-500">Wikipedia + Records</p>
              </button>
            </div>
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <p className="text-gray-800 text-lg font-bold italic leading-relaxed text-center">
                "Discover the life stories of people who matter to you. Search billions of records from FamilySearch and Wikipedia to learn if long lost friends, family, and public figures are still with us."
              </p>
            </div>
          </div>
        )}

        {page === 'watchlist' && (
          <div className="space-y-6">
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Add to Watchlist</h2>
              <div className="space-y-4">
                <input type="text" placeholder="Full Name *" value={nw.name}
                  onChange={(e) => { setNw({...nw, name: e.target.value}); setWatchlistWiki(null); }}
                  onKeyPress={(e) => e.key === 'Enter' && addWatch()}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <input type="text" placeholder="Location" value={nw.location}
                  onChange={(e) => setNw({...nw, location: e.target.value})}
                  onKeyPress={(e) => e.key === 'Enter' && addWatch()}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <input type="date" value={nw.dob}
                  onChange={(e) => setNw({...nw, dob: e.target.value})}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <button onClick={() => addWatch()} disabled={loading}
                  className="w-full py-4 bg-purple-500 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-lg font-bold">
                  <PlusIcon /> {loading ? 'Checking...' : 'Add to Watchlist'}
                </button>
              </div>
            </div>
            {watchlistWiki && <WikiCard profile={watchlistWiki} showAddButton={false} />}
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Your Watchlist ({watchlist.length})</h2>
              {watchlist.length === 0 ? (
                <p className="text-gray-500 text-center py-8">No one on your watchlist yet</p>
              ) : (
                <div className="space-y-3">
                  {watchlist.map(w => (
                    <div key={w.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                      <div className="flex-1">
                        <h3 className="font-semibold text-lg">{w.name}</h3>
                        <div className="text-sm text-gray-600">
                          {w.location && <span>{w.location}</span>}
                          {w.dob && <span> • DOB: {w.dob}</span>}
                        </div>
                        <div className="flex items-center gap-1 mt-2">
                          <CheckIcon />
                          <span className="text-xs text-green-600">Active</span>
                        </div>
                      </div>
                      <button onClick={() => delWatch(w.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg">
                        <TrashIcon />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'search' && (
          <div className="space-y-6">
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Search</h2>
              <div className="space-y-4">
                <input type="text" placeholder="Name" value={sName}
                  onChange={(e) => { setSName(e.target.value); setWikiProfile(null); setResults([]); }}
                  onKeyPress={(e) => e.key === 'Enter' && doSearch()}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <input type="text" placeholder="Location (optional)" value={sLoc}
                  onChange={(e) => setSLoc(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && doSearch()}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <div className="flex gap-3">
                  <button onClick={doSearch} disabled={loading}
                    className="flex-1 py-4 bg-purple-500 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-lg font-bold">
                    <SearchIcon /> {loading ? 'Searching...' : 'Search'}
                  </button>
                  {(sName || wikiProfile || results.length > 0) && (
                    <button onClick={clearSearch}
                      className="py-4 px-5 bg-gray-200 text-gray-600 rounded-lg text-lg font-bold">
                      ✕
                    </button>
                  )}
                </div>
              </div>
            </div>
            {wikiProfile && !loading && <WikiCard profile={wikiProfile} showAddButton={true} />}
            {results.length > 0 && (
              <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
                <h2 className="text-xl font-bold mb-4">Death Records ({results.length})</h2>
                <div className="space-y-3">
                  {results.map(r => (
                    <div key={r.id} className="p-4 border rounded-lg">
                      <div className="flex items-start justify-between mb-2">
                        <h3 className="font-semibold text-lg">{r.name}</h3>
                        <span className={`px-2 py-1 rounded-full text-xs ${r.confidence === 'high' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                          {r.confidence}
                        </span>
                      </div>
                      <div className="text-sm text-gray-600 space-y-1">
                        {r.age && <p>Age: {r.age}</p>}
                        <p>Location: {r.location || 'Unknown'}</p>
                        <p>Date: {r.date || 'Unknown'}</p>
                        <p>Source: {r.source}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {page === 'settings' && (
          <div className="space-y-6">
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Account</h2>
              <div className="p-3 bg-gray-50 rounded-lg mb-4">
                <p className="font-medium">{user?.email}</p>
              </div>
              <div className="space-y-3">
                <button onClick={() => setPage('about')}
                  className="w-full py-3 bg-purple-50 text-purple-700 rounded-lg text-lg font-medium text-left px-4">
                  ℹ️ About Memorial Watch
                </button>
                <button onClick={() => setPage('privacy')}
                  className="w-full py-3 bg-purple-50 text-purple-700 rounded-lg text-lg font-medium text-left px-4">
                  🔒 Privacy Policy
                </button>
              </div>
            </div>
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Status</h2>
              <div className="space-y-3">
                <div className="p-3 bg-green-50 rounded-lg">
                  <span className="text-green-800">✅ Backend: Live</span>
                </div>
                <div className="p-3 bg-blue-50 rounded-lg">
                  <span className="text-blue-800">🔄 Wikipedia: Connected</span>
                </div>
                <div className="p-3 bg-purple-50 rounded-lg">
                  <span className="text-purple-800">📱 Version {APP_VERSION}</span>
                </div>
              </div>
            </div>
            <button onClick={doLogout}
              className="w-full py-4 bg-red-500 text-white rounded-lg text-lg font-bold">
              Sign Out
            </button>
            <div className="mt-8 pt-4 border-t border-gray-300">
              <button onClick={() => setShowDangerZone(!showDangerZone)}
                className="w-full py-2 text-gray-400 text-sm text-center">
                {showDangerZone ? '▲ Hide' : '▼ Account Removal'}
              </button>
              {showDangerZone && (
                <div className="mt-3 space-y-3">
                  {!showDeleteConfirm ? (
                    <button onClick={() => setShowDeleteConfirm(true)}
                      className="w-full py-3 bg-white border border-red-300 text-red-400 rounded-lg text-sm">
                      Delete Account
                    </button>
                  ) : (
                    <div className="bg-red-50 border border-red-200 rounded-2xl p-6 space-y-4">
                      <h3 className="font-bold text-red-700 text-lg">⚠️ Are you sure?</h3>
                      <p className="text-red-600 text-sm">This will permanently delete your account and all watchlist data. This cannot be undone.</p>
                      <button onClick={doDeleteAccount}
                        className="w-full py-3 bg-red-600 text-white rounded-lg font-bold">
                        Yes, Permanently Delete My Account
                      </button>
                      <button onClick={() => { setShowDeleteConfirm(false); setShowDangerZone(false); }}
                        className="w-full py-3 bg-white border border-gray-300 text-gray-600 rounded-lg font-medium">
                        Cancel
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'about' && (
          <div className="space-y-6">
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <BackButton onClick={() => setPage('settings')} />
              <h2 className="text-2xl font-bold mb-2">About Memorial Watch</h2>
              <p className="text-purple-600 italic text-base leading-relaxed mb-6">
                "Discover the life stories of people who matter to you. Search billions of records from FamilySearch and Wikipedia to learn if long lost friends, family, and public figures are still with us."
              </p>
              <div className="space-y-4 text-gray-700 text-base leading-relaxed">
                <p>Memorial Watch was produced by three brains. Mine, ChatGPT and Claude. I'm a retired 74 year old former high-tech entrepreneur and early adopter of new tech. I've owned just about every Apple product that has come out since the Apple II. I love the evolution of search tools and have become enamored with AI and how to use it for useful things. 23andMe, I'm in. Ancestry, I'm in. AI, count me ecstatic and in.</p>
                <p>As I get older, traditional search engines have become really frustrating, so I find asking AI to be much more effective. However, one thing you cannot do until now (other than stock trading platforms) is to have a "watchlist" of some kind that can alert you to events that are important to you. In my case I found it very hard, using existing tools, to find out if former friends, classmates, colleagues and even famous figures were dead or alive. Hence, Memorial Watch.</p>
                <p>We have partnered with FamilySearch, a genealogy website maintained by the Church of Jesus Christ of Latter-day Saints that stores obituary information dating back to 1936. With Memorial Watch you can enter a name and Memorial Watch will either inform you whether that person is still alive or not. If available, Memorial Watch will also provide a short bio if the person is famous, or the obituary itself.</p>
                <p>Memorial Watch is also partnered with Wikipedia which provides biography information on famous or notable people that we display for Watchlist and Search results. A portion of proceeds will be donated to Wikipedia to help assure their continued great service.</p>
                <p>Finally, we want to make this the most usable and helpful way to keep track of people that matter to you. If you have any thoughts on how to improve Memorial Watch, please contact us with your suggestions.</p>
              </div>
              <div className="mt-6 pt-6 border-t border-gray-100">
                <div className="flex items-center gap-4">
                  <img src={BILL_PHOTO} alt="Bill Spencer"
                    className="w-20 h-20 rounded-full object-cover border-2 border-purple-400 shadow-lg" />
                  <div>
                    <p className="font-bold text-gray-800 text-lg">Bill Spencer</p>
                    <p className="text-purple-500 italic">Idea Hamster 🐹</p>
                    <a href="mailto:contact@memorialwatch.com"
                      className="text-purple-500 text-sm mt-1 block">
                      contact@memorialwatch.com
                    </a>
                  </div>
                </div>
              </div>
              <BackButton onClick={() => setPage('settings')} />
            </div>
          </div>
        )}

        {page === 'privacy' && (
          <div className="space-y-6">
            <div className="bg-white/90 rounded-2xl p-6 shadow-lg">
              <BackButton onClick={() => setPage('settings')} />
              <h2 className="text-2xl font-bold mb-6">Privacy Policy</h2>
              <p className="text-gray-500 text-sm mb-6">Last updated: March 15, 2026</p>
              <div className="space-y-6 text-gray-700 text-base leading-relaxed">
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">1. Information We Collect</h3>
                  <p>We collect only what is necessary to provide our service: your email address for account creation and login, the names you add to your watchlist, search queries you enter, and basic anonymous usage data to improve the app.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">2. How We Use Your Information</h3>
                  <p>We use your information to authenticate your account, maintain your personal watchlist, deliver notifications when watchlist matches are found, and improve app features based on anonymous usage patterns. We do not sell your personal information to third parties. Ever.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">3. Data Sources</h3>
                  <p>Search results are powered by FamilySearch (familysearch.org) for genealogical death records, and Wikipedia (wikipedia.org) for biographical information. These are free, publicly available services. We do not permanently store their content.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">4. Data Storage</h3>
                  <p>Your data is stored securely on Render.com servers located in the United States. We use industry-standard encryption for all data transmission.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">5. Your Rights</h3>
                  <p>You have the right to access, correct, or delete your personal data at any time. You may delete your account and all associated data from the Settings page. This action is permanent and cannot be undone.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">6. Children's Privacy</h3>
                  <p>This service is not directed at children under 13. We do not knowingly collect data from children.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">7. Third Party Services</h3>
                  <p>We use Render.com for hosting, Vercel for frontend delivery, FamilySearch API for death records, and Wikipedia API for biographical data.</p>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 mb-2">8. Contact</h3>
                  <p>For privacy concerns please contact us at:</p>
                  <a href="mailto:contact@memorialwatch.com"
                    className="text-purple-500">contact@memorialwatch.com</a>
                </div>
              </div>
              <BackButton onClick={() => setPage('settings')} />
            </div>
          </div>
        )}

      </div>

      <div style={{
        position: 'fixed',
        bottom: 0, left: 0, right: 0,
        backgroundColor: 'rgba(255,255,255,0.95)',
        borderTop: '1px solid #e5e7eb',
        padding: '0.75rem 1rem',
      }}>
        <div className="flex justify-around max-w-md mx-auto">
          <button onClick={() => setPage('home')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'home' ? 'text-purple-500' : 'text-gray-400'}`}>
            <HomeIcon />
            <span className="text-xs">Home</span>
          </button>
          <button onClick={() => setPage('watchlist')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'watchlist' ? 'text-purple-500' : 'text-gray-400'}`}>
            <HeartIcon />
            <span className="text-xs">Watchlist</span>
          </button>
          <button onClick={() => setPage('search')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'search' ? 'text-purple-500' : 'text-gray-400'}`}>
            <SearchIcon />
            <span className="text-xs">Search</span>
          </button>
          <button onClick={() => setPage('settings')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'settings' ? 'text-purple-500' : 'text-gray-400'}`}>
            <SettingsIcon />
            <span className="text-xs">Settings</span>
          </button>
        </div>
      </div>
    </PageWrapper>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
