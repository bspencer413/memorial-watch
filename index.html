<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#9333ea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dead or Alive</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRGVhZCBvciBBbGl2ZSIsInNob3J0X25hbWUiOiJEZWFkL0FsaXZlIiwic3RhcnRfdXJsIjoiLyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMxZTFiNGIiLCJ0aGVtZV9jb2xvciI6IiM5MzMzZWEifQ==">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;padding:0">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const API_BASE = 'https://memorial-watch-backend-2.onrender.com';

const HomeIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
  </svg>
);

const HeartIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
  </svg>
);

const SearchIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
);

const SettingsIcon = () => (
  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
  </svg>
);

const PlusIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
  </svg>
);

const TrashIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
  </svg>
);

const CheckIcon = () => (
  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
  </svg>
);

const EyeIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
  </svg>
);

const EyeOffIcon = () => (
  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
  </svg>
);

function App() {
  const [page, setPage] = useState('home');
  const [auth, setAuth] = useState(false);
  const [user, setUser] = useState(null);
  const [watchlist, setWatchlist] = useState([]);
  const [results, setResults] = useState([]);
  const [wikiProfile, setWikiProfile] = useState(null);
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [sName, setSName] = useState('');
  const [sLoc, setSLoc] = useState('');
  const [nw, setNw] = useState({ name: '', location: '', dob: '' });

  useEffect(() => {
    const t = localStorage.getItem('token');
    const u = localStorage.getItem('user');
    if (t && u) {
      setUser(JSON.parse(u));
      setAuth(true);
      setPage('home');
      loadWatchlist();
    }
  }, []);

  const loadWatchlist = async () => {
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/watchlist`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed');
      const data = await response.json();
      setWatchlist(data);
    } catch (error) {
      console.error(error);
    }
  };

  const doAuth = async () => {
    if (!email || !password) return;
    setLoading(true);
    try {
      const endpoint = mode === 'login' ? 'login' : 'register';
      const response = await fetch(`${API_BASE}/auth/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Auth failed');
      }
      const data = await response.json();
      localStorage.setItem('token', data.access_token);
      const u = { email, id: '123', name: email.split('@')[0] };
      localStorage.setItem('user', JSON.stringify(u));
      setUser(u);
      setAuth(true);
      setPage('home');
      loadWatchlist();
    } catch (error) {
      alert('Error: ' + error.message);
    } finally {
      setLoading(false);
    }
  };

  const doLogout = () => {
    localStorage.clear();
    setAuth(false);
    setUser(null);
    setWatchlist([]);
    setResults([]);
    setWikiProfile(null);
  };

  const addWatch = async (nameOverride) => {
  const name = nameOverride || nw.name;
  if (!name.trim()) return;
  setLoading(true);
  setWikiProfile(null);
  try {
    const wikiRes = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
    );
    const wikiData = await wikiRes.json();
    if (wikiData.extract) {
    const extract = wikiData.extract || '';
    const description = wikiData.description || '';
    const hasDeathInBrackets = /\(\d{4}.{0,20}\d{4}\)/.test(extract);
    const hasYearsInDescription = /\(\d{4}.*?\d{4}\)/.test(description);
    const isPastTense = /\bwas (an?|the)\b/.test(extract.split('.')[0]);
    const diedInExtract = /\b(died|death|passed away|deceased)\b/i.test(extract);
    const diedInDescription = /\b(died|death|deceased)\b/i.test(description);
    const hasDeathDate = !!wikiData.death_date;
    const isDeceased = hasDeathDate || hasDeathInBrackets || hasYearsInDescription || isPastTense || diedInExtract || diedInDescription;
      setWikiProfile({
        title: wikiData.title,
        extract: extract,
        thumbnail: wikiData.thumbnail?.source,
        birthDate: wikiData.birth_date || null,
        deathDate: isDeceased ? (wikiData.death_date || 'deceased') : null,
        description: description,
      });
      if (isDeceased) {
  setNw({ name: '', location: '', dob: '' });
  setLoading(false);
  return;
}

      }
    }
    const token = localStorage.getItem('token');
    const response = await fetch(`${API_BASE}/watchlist`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(nameOverride ? { name: nameOverride, location: '', dob: '' } : nw)
    });
    if (!response.ok) throw new Error('Failed');
    await loadWatchlist();
    if (!nameOverride) setNw({ name: '', location: '', dob: '' });
    alert('✅ Added to Watchlist!');
  } catch (error) {
    alert('Error: ' + error.message);
  } finally {
    setLoading(false);
  }
};

  const delWatch = async (id) => {
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/watchlist/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed');
      await loadWatchlist();
    } catch (error) {
      alert('Error: ' + error.message);
    }
  };

  const doSearch = async () => {
    if (!sName.trim()) return;
    setLoading(true);
    setWikiProfile(null);
    setResults([]);
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API_BASE}/search`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ name: sName, location: sLoc || undefined })
      });
      if (!response.ok) throw new Error('Failed');
      const data = await response.json();
      setResults(data);
      const wikiRes = await fetch(
        `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(sName)}`
      );
      const wikiData = await wikiRes.json();
      if (wikiData.extract) {
        const extract = wikiData.extract || '';
        const description = wikiData.description || '';
        const hasDeathInBrackets = /\(\d{4}.{0,20}\d{4}\)/.test(extract);
        const hasYearsInDescription = /\(\d{4}.*?\d{4}\)/.test(description);
        const isPastTense = /\bwas (an?|the)\b/.test(extract.split('.')[0]);
        const diedInExtract = /\b(died|death|passed away|deceased)\b/i.test(extract);
        const diedInDescription = /\b(died|death|deceased)\b/i.test(description);
        const hasDeathDate = !!wikiData.death_date;
        const isDeceased = hasDeathDate || hasDeathInBrackets || hasYearsInDescription || isPastTense || diedInExtract || diedInDescription;

        setWikiProfile({
          title: wikiData.title,
          extract: extract,
          thumbnail: wikiData.thumbnail?.source,
          birthDate: wikiData.birth_date || null,
          deathDate: isDeceased ? (wikiData.death_date || 'deceased') : null,
          description: description,
        });
      }
    } catch (error) {
      alert('Error: ' + error.message);
    } finally {
      setLoading(false);
    }
  };

  if (!auth) {
    return (
      <div className="min-h-screen relative flex flex-col justify-end pb-60"
        style={{
          backgroundImage: 'url(https://raw.githubusercontent.com/Bspencer413/Memorial-watch/main/IMG_0437.png)',
          backgroundSize: 'cover',
          backgroundPosition: 'center top',
          backgroundRepeat: 'no-repeat'
        }}>
        <div className="bg-black/40 backdrop-blur-sm p-3 space-y-2">
          <div className="flex gap-3 mb-2">
            <button onClick={() => setMode('login')}
              className={`flex-1 py-3 rounded-xl font-bold text-xl ${mode === 'login' ? 'bg-purple-500 text-white' : 'bg-white/20 text-white/70'}`}>
              Login
            </button>
            <button onClick={() => setMode('register')}
              className={`flex-1 py-3 rounded-xl font-bold text-xl ${mode === 'register' ? 'bg-purple-500 text-white' : 'bg-white/20 text-white/70'}`}>
              Register
            </button>
          </div>
          <input
            type="email"
            placeholder="Email"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && doAuth()}
            className="w-full px-5 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-purple-500 text-xl"
          />
          <div className="relative">
            <input
              type={showPassword ? 'text' : 'password'}
              placeholder="Password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && doAuth()}
              className="w-full px-5 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-purple-500 text-xl"
            />
            <button
              onClick={() => setShowPassword(!showPassword)}
              className="absolute right-4 top-1/2 -translate-y-1/2 text-white/60">
              {showPassword ? <EyeOffIcon /> : <EyeIcon />}
            </button>
          </div>
          <button
            onClick={doAuth}
            disabled={loading}
            className="w-full py-4 bg-purple-500 hover:bg-purple-600 text-white font-bold rounded-xl disabled:opacity-50 text-xl tracking-wide">
            {loading ? 'Loading...' : mode === 'login' ? 'Login' : 'Create Account'}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gray-50 pb-20">
      <div className="max-w-md mx-auto p-4">

        {page === 'home' && (
          <div className="space-y-6">
            <div className="bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl p-6 text-white">
              <h2 className="text-3xl font-bold mb-1">Dead or Alive</h2>
              <p className="text-sm text-white/80 mb-3">Memorial Watch</p>
              <p className="text-white/90">Welcome, {user?.name}! 👋</p>
              <p className="text-white/80 text-sm">Monitoring {watchlist.length} people</p>
              <div className="mt-4 p-3 bg-white/20 rounded-lg">
                <p className="text-sm">🚀 Real Backend Connected!</p>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <button onClick={() => setPage('watchlist')} className="bg-white rounded-xl p-6 shadow-lg">
                <HeartIcon />
                <h3 className="font-semibold text-gray-800 mt-3">Watchlist</h3>
                <p className="text-sm text-gray-500">{watchlist.length} people</p>
              </button>
              <button onClick={() => setPage('search')} className="bg-white rounded-xl p-6 shadow-lg">
                <SearchIcon />
                <h3 className="font-semibold text-gray-800 mt-3">Search</h3>
                <p className="text-sm text-gray-500">Wikipedia + Records</p>
              </button>
            </div>
          </div>
        )}

        {page === 'watchlist' && (
          <div className="space-y-6">
            <div className="bg-white rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Add to Watchlist</h2>
              <div className="space-y-4">
                <input type="text" placeholder="Full Name *" value={nw.name} onChange={(e) => setNw({...nw, name: e.target.value})} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <input type="text" placeholder="Location" value={nw.location} onChange={(e) => setNw({...nw, location: e.target.value})} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <input type="date" value={nw.dob} onChange={(e) => setNw({...nw, dob: e.target.value})} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <button onClick={() => addWatch()} disabled={loading} className="w-full py-4 bg-purple-500 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-lg font-bold">
                  <PlusIcon /> {loading ? 'Adding...' : 'Add to Watchlist'}
                </button>
              </div>
            </div>
            {wikiProfile && (
  <div className="rounded-2xl overflow-hidden border border-purple-300 shadow-lg">
    <div className={`px-5 py-3 flex items-center gap-3 ${wikiProfile.deathDate ? 'bg-gray-600' : 'bg-green-600'}`}>
      <span className="text-white font-black tracking-widest text-sm">
        {wikiProfile.deathDate ? '⚫ DECEASED' : '🟢 ALIVE'}
      </span>
    </div>
    <div className="bg-indigo-950 p-5">
      <div className="flex gap-4 items-start mb-4">
        {wikiProfile.thumbnail ? (
          <img src={wikiProfile.thumbnail} alt={wikiProfile.title}
            className="w-20 h-20 rounded-full object-cover border-2 border-purple-400/50 shrink-0" />
        ) : (
          <div className="w-20 h-20 rounded-full bg-purple-800/40 flex items-center justify-center shrink-0 text-3xl">👤</div>
        )}
        <div className="flex-1">
          <h2 className="text-white text-xl font-bold mb-1">{wikiProfile.title}</h2>
          <p className="text-purple-300 text-sm italic mb-1">{wikiProfile.description}</p>
        </div>
      </div>
      <p className="text-purple-100 text-base leading-relaxed mb-4">
        {wikiProfile.extract?.split('. ').slice(0, 3).join('. ') + '.'}
      </p>
      {wikiProfile.deathDate && (
        <div className="p-3 bg-gray-500/30 border border-gray-400/30 rounded-xl">
          <p className="text-gray-200 text-sm text-center">
            ⚫ This person has passed away — no need to add to watchlist
          </p>
        </div>
      )}
      {!wikiProfile.deathDate && (
        <div className="p-3 bg-green-500/20 border border-green-400/30 rounded-xl">
          <p className="text-green-200 text-sm text-center">
            🟢 Added to your watchlist!
          </p>
        </div>
      )}
    </div>
  </div>
)}

            <div className="bg-white rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Your Watchlist ({watchlist.length})</h2>
              {watchlist.length === 0 ? (
                <p className="text-gray-500 text-center py-8">No one on your watchlist yet</p>
              ) : (
                <div className="space-y-3">
                  {watchlist.map(w => (
                    <div key={w.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                      <div className="flex-1">
                        <h3 className="font-semibold text-lg">{w.name}</h3>
                        <div className="text-sm text-gray-600">
                          {w.location && <span>{w.location}</span>}
                          {w.dob && <span> • DOB: {w.dob}</span>}
                        </div>
                        <div className="flex items-center gap-1 mt-2">
                          <CheckIcon />
                          <span className="text-xs text-green-600">Active</span>
                        </div>
                      </div>
                      <button onClick={() => delWatch(w.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg">
                        <TrashIcon />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'search' && (
          <div className="space-y-6">
            <div className="bg-white rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Search</h2>
              <div className="space-y-4">
                <input type="text" placeholder="Name *" value={sName}
                  onChange={(e) => { setSName(e.target.value); setWikiProfile(null); setResults([]); }}
                  onKeyPress={(e) => e.key === 'Enter' && doSearch()}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <input type="text" placeholder="Location (optional)" value={sLoc}
                  onChange={(e) => setSLoc(e.target.value)}
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 text-lg" />
                <button onClick={doSearch} disabled={loading}
                  className="w-full py-4 bg-purple-500 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-lg font-bold">
                  <SearchIcon /> {loading ? 'Searching...' : 'Search'}
                </button>
              </div>
            </div>

            {wikiProfile && !loading && (
              <div className="rounded-2xl overflow-hidden border border-purple-300 shadow-lg">
                <div className={`px-5 py-3 flex items-center gap-3 ${wikiProfile.deathDate ? 'bg-gray-600' : 'bg-green-600'}`}>
                  <span className="text-white font-black tracking-widest text-sm">
                    {wikiProfile.deathDate ? '⚫ DECEASED' : '🟢 ALIVE'}
                  </span>
                  {wikiProfile.deathDate && wikiProfile.deathDate !== 'deceased' && (
                    <span className="text-white/80 text-xs ml-auto">Died: {wikiProfile.deathDate}</span>
                  )}
                </div>
                <div className="bg-indigo-950 p-5">
                  <div className="flex gap-4 items-start mb-4">
                    {wikiProfile.thumbnail ? (
                      <img src={wikiProfile.thumbnail} alt={wikiProfile.title}
                        className="w-20 h-20 rounded-full object-cover border-2 border-purple-400/50 shrink-0" />
                    ) : (
                      <div className="w-20 h-20 rounded-full bg-purple-800/40 flex items-center justify-center shrink-0 text-3xl">👤</div>
                    )}
                    <div className="flex-1">
                      <h2 className="text-white text-xl font-bold mb-1">{wikiProfile.title}</h2>
                      <p className="text-purple-300 text-sm italic mb-1">{wikiProfile.description}</p>
                      {wikiProfile.birthDate && (
                        <p className="text-purple-400 text-xs">🎂 Born: {wikiProfile.birthDate}</p>
                      )}
                    </div>
                  </div>
                  <p className="text-purple-100 text-base leading-relaxed mb-4">
                    {wikiProfile.extract?.split('. ').slice(0, 3).join('. ') + '.'}
                  </p>
                  {!wikiProfile.deathDate && (
                    <button
                      onClick={() => addWatch(wikiProfile.title)}
                      className="w-full py-3 bg-purple-500 hover:bg-purple-600 text-white rounded-xl font-bold text-base flex items-center justify-center gap-2 mb-3">
                      <PlusIcon /> Add to Watchlist
                    </button>
                  )}
                  <div className="p-3 bg-purple-600/20 border border-purple-500/20 rounded-xl">
                    <p className="text-purple-200 text-xs leading-relaxed">
                      💜 Data provided by Wikipedia. Dead or Alive donates a portion of revenues to the Wikimedia Foundation.
                    </p>
                  </div>
                </div>
              </div>
            )}

            {results.length > 0 && (
              <div className="bg-white rounded-2xl p-6 shadow-lg">
                <h2 className="text-xl font-bold mb-4">Death Records ({results.length})</h2>
                <div className="space-y-3">
                  {results.map(r => (
                    <div key={r.id} className="p-4 border rounded-lg">
                      <div className="flex items-start justify-between mb-2">
                        <h3 className="font-semibold text-lg">{r.name}</h3>
                        <span className={`px-2 py-1 rounded-full text-xs ${r.confidence === 'high' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                          {r.confidence}
                        </span>
                      </div>
                      <div className="text-sm text-gray-600 space-y-1">
                        {r.age && <p>Age: {r.age}</p>}
                        <p>Location: {r.location || 'Unknown'}</p>
                        <p>Date: {r.date || 'Unknown'}</p>
                        <p>Source: {r.source}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {page === 'settings' && (
          <div className="space-y-6">
            <div className="bg-white rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Account</h2>
              <div className="p-3 bg-gray-50 rounded-lg">
                <p className="font-medium">{user?.email}</p>
              </div>
            </div>
            <div className="bg-white rounded-2xl p-6 shadow-lg">
              <h2 className="text-xl font-bold mb-4">Status</h2>
              <div className="space-y-3">
                <div className="p-3 bg-green-50 rounded-lg">
                  <span className="text-green-800">✅ Backend: Live</span>
                </div>
                <div className="p-3 bg-blue-50 rounded-lg">
                  <span className="text-blue-800">🔄 Wikipedia: Connected</span>
                </div>
              </div>
            </div>
            <button onClick={doLogout} className="w-full py-4 bg-red-500 text-white rounded-lg text-lg font-bold">
              Sign Out
            </button>
          </div>
        )}

      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t px-4 py-3">
        <div className="flex justify-around max-w-md mx-auto">
          <button onClick={() => setPage('home')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'home' ? 'text-purple-500' : 'text-gray-400'}`}>
            <HomeIcon />
            <span className="text-xs">Home</span>
          </button>
          <button onClick={() => setPage('watchlist')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'watchlist' ? 'text-purple-500' : 'text-gray-400'}`}>
            <HeartIcon />
            <span className="text-xs">Watchlist</span>
          </button>
          <button onClick={() => setPage('search')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'search' ? 'text-purple-500' : 'text-gray-400'}`}>
            <SearchIcon />
            <span className="text-xs">Search</span>
          </button>
          <button onClick={() => setPage('settings')} className={`flex flex-col items-center gap-1 px-4 py-2 ${page === 'settings' ? 'text-purple-500' : 'text-gray-400'}`}>
            <SettingsIcon />
            <span className="text-xs">Settings</span>
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
